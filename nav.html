<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>HANEDA — ナビゲート中</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Noto+Sans+JP:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="styles.css" />
</head>
<body>
<div class="flow-hint">⑥ リアルタイムナビ (ナビ画面)</div>
<div class="stage">
  <div class="phone">
    <div class="screen screen-nav">
      <div class="status-bar">
        <span>9:41</span>
        <div class="status-icons">
          <svg viewBox="0 0 16 11" fill="none"><path d="M1 7c0-.6.4-1 1-1h1c.6 0 1 .4 1 1v3c0 .6-.4 1-1 1H2c-.6 0-1-.4-1-1V7zm5-2c0-.6.4-1 1-1h1c.6 0 1 .4 1 1v5c0 .6-.4 1-1 1H7c-.6 0-1-.4-1-1V5zm5-3c0-.6.4-1 1-1h1c.6 0 1 .4 1 1v8c0 .6-.4 1-1 1h-1c-.6 0-1-.4-1-1V2z" fill="currentColor"/></svg>
          <svg viewBox="0 0 16 11" fill="none"><path d="M8 2c2.2 0 4.2.8 5.8 2.2l-1.4 1.4C11.1 4.5 9.6 4 8 4s-3.1.5-4.4 1.6L2.2 4.2C3.8 2.8 5.8 2 8 2zM8 6c1.1 0 2.1.4 2.9 1l-1.4 1.4C9.1 8.1 8.6 8 8 8c-.6 0-1.1.1-1.5.4L5.1 7c.8-.6 1.8-1 2.9-1zm0 3c.6 0 1 .4 1 1s-.4 1-1 1-1-.4-1-1 .4-1 1-1z" fill="currentColor"/></svg>
          <svg viewBox="0 0 22 11" fill="none"><rect x="1" y="1" width="18" height="9" rx="2" stroke="currentColor" stroke-opacity="0.4"/><rect x="2" y="2" width="16" height="7" rx="1" fill="currentColor"/><rect x="20" y="4" width="1.5" height="3" rx="0.5" fill="currentColor" opacity="0.4"/></svg>
        </div>
      </div>

      <div class="sub-header">
        <a href="route.html" class="icon-btn" aria-label="back">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
        </a>
        <div class="title">ナビゲート中</div>
        <button class="icon-btn" aria-label="settings">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        </button>
      </div>

      <div class="nav-body">

        <!-- 1. TOP: Interior map -->
        <div class="nav-map">
          <svg class="nav-map-svg" viewBox="0 0 320 200" preserveAspectRatio="xMidYMid slice">
            <!-- Background -->
            <rect width="320" height="200" fill="#eef2f7"/>
            <!-- Airside (beyond security) tinted -->
            <rect x="180" y="0" width="140" height="200" fill="#e5ecf5"/>

            <!-- Main horizontal corridor -->
            <rect x="0" y="80" width="320" height="40" fill="#ffffff" stroke="#d8dde6" stroke-width="0.5"/>
            <!-- Vertical connectors -->
            <rect x="90" y="20" width="40" height="160" fill="#ffffff" stroke="#d8dde6" stroke-width="0.5"/>
            <rect x="220" y="20" width="40" height="160" fill="#ffffff" stroke="#d8dde6" stroke-width="0.5"/>

            <!-- Shops / rooms -->
            <rect x="14" y="20" width="70" height="55" fill="#f7f9fc" stroke="#d8dde6" stroke-width="0.5" rx="2"/>
            <rect x="136" y="20" width="78" height="55" fill="#f7f9fc" stroke="#d8dde6" stroke-width="0.5" rx="2"/>
            <rect x="266" y="20" width="48" height="55" fill="#f7f9fc" stroke="#d8dde6" stroke-width="0.5" rx="2"/>
            <rect x="14" y="125" width="70" height="55" fill="#f7f9fc" stroke="#d8dde6" stroke-width="0.5" rx="2"/>
            <rect x="136" y="125" width="78" height="55" fill="#f7f9fc" stroke="#d8dde6" stroke-width="0.5" rx="2"/>
            <rect x="266" y="125" width="48" height="55" fill="#f7f9fc" stroke="#d8dde6" stroke-width="0.5" rx="2"/>

            <!-- Security checkpoint line -->
            <line x1="180" y1="10" x2="180" y2="190" stroke="#ff9248" stroke-width="1.5" stroke-dasharray="3 2" opacity="0.7"/>

            <!-- Shop labels -->
            <text x="49" y="50" text-anchor="middle" font-family="Inter" font-size="8" fill="#8b94a8">免税店</text>
            <text x="175" y="50" text-anchor="middle" font-family="Inter" font-size="8" fill="#8b94a8">カフェ</text>
            <text x="290" y="50" text-anchor="middle" font-family="Inter" font-size="8" fill="#8b94a8">ラウンジ</text>
            <text x="49" y="155" text-anchor="middle" font-family="Inter" font-size="8" fill="#8b94a8">書店</text>
            <text x="175" y="155" text-anchor="middle" font-family="Inter" font-size="8" fill="#8b94a8">レストラン</text>
            <text x="290" y="155" text-anchor="middle" font-family="Inter" font-size="8" fill="#8b94a8">売店</text>

            <!-- Route path (traveled portion — lighter) -->
            <path d="M 15 100 L 50 100" fill="none" stroke="#a9bae5" stroke-width="4" stroke-linecap="round"/>
            <!-- Route path (remaining — solid navy) -->
            <path d="M 50 100 L 110 100 L 110 45 L 200 45 L 200 100 L 280 100 L 280 75"
              fill="none" stroke="#2844a0" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>

            <!-- Security checkpoint marker -->
            <g transform="translate(180, 100)">
              <circle r="9" fill="#ffffff" stroke="#ff9248" stroke-width="2"/>
              <text y="3" text-anchor="middle" font-family="Inter" font-size="9" font-weight="700" fill="#ff9248">安</text>
            </g>

            <!-- Destination gate pin -->
            <g transform="translate(280, 65)">
              <path d="M 0 -14 C -8 -14 -14 -8 -14 0 C -14 10 0 20 0 20 C 0 20 14 10 14 0 C 14 -8 8 -14 0 -14 Z" fill="#2844a0"/>
              <circle r="7" fill="#ffffff"/>
              <text y="2" text-anchor="middle" font-family="Inter" font-size="7" font-weight="700" fill="#2844a0">112</text>
            </g>
          </svg>

          <!-- Current location pulsing pin (HTML overlay for animation) -->
          <div class="nav-current-pin" style="top: 50%; left: 15.6%;">
            <div class="cone"></div>
            <div class="pulse"></div>
            <div class="pulse-dot"></div>
          </div>

          <div class="nav-map-floor">3F 国内線</div>
          <button class="nav-map-recenter" aria-label="recenter">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3" fill="currentColor"/><line x1="12" y1="2" x2="12" y2="4"/><line x1="12" y1="20" x2="12" y2="22"/><line x1="2" y1="12" x2="4" y2="12"/><line x1="20" y1="12" x2="22" y2="12"/></svg>
          </button>
          <div class="nav-map-scale">50m</div>
        </div>

        <!-- 2. MIDDLE: Direction -->
        <div class="nav-direction-panel">
          <div class="arrow-circle-sm">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <line x1="12" y1="19" x2="12" y2="5"/>
              <polyline points="5 12 12 5 19 12"/>
            </svg>
          </div>
          <div class="dir-text">
            <div class="sub">直進</div>
            <div class="main"><span>120</span>m</div>
          </div>
          <div class="dir-next">
            <div class="label">次</div>
            <div class="val">
              右折
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M7 17V7h10"/><polyline points="13 11 17 7 13 3"/></svg>
            </div>
            <div class="dist">70m先</div>
          </div>
        </div>

        <!-- 3. BOTTOM: Route info / progress -->
        <div class="nav-route-info">
          <div class="route-summary">
            <div class="left">
              <span class="main">あと 18分</span>
              <span class="sub">450m · 搭乗口 112 · 10:33 到着予定</span>
            </div>
            <div class="right">
              <div>進捗 30%</div>
              <div class="progress-track"><div class="fill"></div></div>
            </div>
          </div>

          <div class="route-steps-label">現在のルート</div>
          <div class="route-steps">
            <div class="step current">
              <span class="dot"></span>
              <div class="body">
                <div class="t">現在地</div>
                <div class="s">国内線ロビー 3F</div>
              </div>
              <div class="meta">
                0m
              </div>
            </div>
            <div class="step">
              <span class="dot"></span>
              <div class="body">
                <div class="t">保安検査場</div>
                <div class="s">待ち時間 約 5分</div>
              </div>
              <div class="meta">
                150m
              </div>
            </div>
            <div class="step">
              <span class="dot"></span>
              <div class="body">
                <div class="t">3F コンコース</div>
                <div class="s">制限エリア入口</div>
              </div>
              <div class="meta">
                300m
              </div>
            </div>
            <div class="step end">
              <span class="dot"></span>
              <div class="body">
                <div class="t">搭乗口 112</div>
                <div class="s">NH123 ロンドン (LHR) 行</div>
              </div>
              <div class="meta">
                450m
              </div>
            </div>
          </div>
        </div>

      </div><!-- /nav-body -->

      <div class="nav-bottom">
        <a href="route.html" class="nav-btn">
          <div class="icn">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><circle cx="12" cy="12" r="3"/></svg>
          </div>
          <span>経路を再検索</span>
        </a>
        <button class="nav-btn pause">
          <div class="icn">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
          </div>
          <span>一時停止</span>
        </button>
        <a href="main.html" class="nav-btn">
          <div class="icn">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </div>
          <span>ナビを終了</span>
        </a>
      </div>

      <div class="home-ind"></div>
    </div>
  </div>
</div>
</body>
</html>
