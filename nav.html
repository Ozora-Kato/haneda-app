<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=resizes-content" />
<title>HANEDA — ナビゲート中</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Noto+Sans+JP:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="styles.css" />
<style>
  /* Completion modal — shown 1s after the final step is confirmed */
  .nav-complete-modal {
    position: absolute;
    inset: 0;
    background: rgba(13, 27, 75, 0.45);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 100;
    opacity: 0;
    transition: opacity .3s ease;
  }
  .nav-complete-modal.open { display: flex; opacity: 1; }
  .nav-complete-card {
    background: #ffffff;
    width: 280px;
    height: 280px;
    border-radius: 24px;
    padding: 32px 24px 28px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 18px;
    box-shadow: 0 24px 60px -10px rgba(13, 27, 75, 0.4);
    transform: scale(0.92);
    transition: transform .35s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .nav-complete-modal.open .nav-complete-card { transform: scale(1); }
  .nav-complete-icon {
    width: 200px;
    height: auto;
    display: block;
  }
  .nav-complete-text {
    font-size: 16px;
    font-weight: 700;
    color: var(--navy-900);
    text-align: center;
    letter-spacing: 0.04em;
  }
  .nav-complete-cta {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    background: var(--navy-700);
    color: #fff;
    text-decoration: none;
    padding: 11px 28px;
    border-radius: 999px;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.02em;
    -webkit-tap-highlight-color: transparent;
    transition: background .15s ease, transform .15s ease;
  }
  .nav-complete-cta:active { background: var(--navy-800); transform: scale(0.98); }
</style>
</head>
<body>
<div class="flow-hint">⑥ リアルタイムナビ (ナビ画面)</div>
<div class="stage">
  <div class="phone">
    <div class="screen screen-nav">
      <div class="status-bar">
        <span>9:41</span>
        <div class="status-icons">
          <svg viewBox="0 0 16 11" fill="none"><path d="M1 7c0-.6.4-1 1-1h1c.6 0 1 .4 1 1v3c0 .6-.4 1-1 1H2c-.6 0-1-.4-1-1V7zm5-2c0-.6.4-1 1-1h1c.6 0 1 .4 1 1v5c0 .6-.4 1-1 1H7c-.6 0-1-.4-1-1V5zm5-3c0-.6.4-1 1-1h1c.6 0 1 .4 1 1v8c0 .6-.4 1-1 1h-1c-.6 0-1-.4-1-1V2z" fill="currentColor"/></svg>
          <svg viewBox="0 0 16 11" fill="none"><path d="M8 2c2.2 0 4.2.8 5.8 2.2l-1.4 1.4C11.1 4.5 9.6 4 8 4s-3.1.5-4.4 1.6L2.2 4.2C3.8 2.8 5.8 2 8 2zM8 6c1.1 0 2.1.4 2.9 1l-1.4 1.4C9.1 8.1 8.6 8 8 8c-.6 0-1.1.1-1.5.4L5.1 7c.8-.6 1.8-1 2.9-1zm0 3c.6 0 1 .4 1 1s-.4 1-1 1-1-.4-1-1 .4-1 1-1z" fill="currentColor"/></svg>
          <svg viewBox="0 0 22 11" fill="none"><rect x="1" y="1" width="18" height="9" rx="2" stroke="currentColor" stroke-opacity="0.4"/><rect x="2" y="2" width="16" height="7" rx="1" fill="currentColor"/><rect x="20" y="4" width="1.5" height="3" rx="0.5" fill="currentColor" opacity="0.4"/></svg>
        </div>
      </div>

      <div class="sub-header">
        <a href="route.html" class="icon-btn" aria-label="back">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
        </a>
        <div class="title">ナビゲート中</div>
        <button class="icon-btn" aria-label="settings">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        </button>
      </div>

      <div class="nav-body">

        <!-- 1. TOP: Wide-area transit map (Akihabara → Haneda) -->
        <div class="nav-map">
          <svg class="nav-map-svg" viewBox="0 0 288 200" preserveAspectRatio="xMidYMid meet">
            <defs>
              <linearGradient id="bayGrad" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0" stop-color="#c5dcee"/>
                <stop offset="1" stop-color="#a5c1dc"/>
              </linearGradient>
            </defs>

            <!-- Land background -->
            <rect width="288" height="200" fill="#e8ede4"/>

            <!-- Tokyo Bay (bottom-right) -->
            <path d="M 170 200 L 170 160 Q 200 148 230 148 L 250 130 L 288 122 L 288 200 Z" fill="url(#bayGrad)"/>

            <!-- Haneda Airport island -->
            <path d="M 225 150 L 268 146 L 282 168 L 268 190 L 230 188 Z" fill="#d6dde6" stroke="#b4bcc8" stroke-width="0.4"/>
            <rect x="242" y="163" width="36" height="2" fill="#a0a8b8" transform="rotate(-8 260 164)"/>

            <!-- Subtle road network -->
            <g opacity="0.35" stroke="#ffffff" stroke-linecap="round" fill="none">
              <path d="M 0 30 L 288 60" stroke-width="1.8"/>
              <path d="M 0 95 L 180 140" stroke-width="1.8"/>
              <path d="M 70 0 L 100 200" stroke-width="1.3"/>
              <path d="M 180 0 L 160 160" stroke-width="1.3"/>
            </g>

            <!-- Parks -->
            <ellipse cx="100" cy="26" rx="26" ry="12" fill="#d0e2be" opacity="0.75"/>
            <ellipse cx="190" cy="68" rx="22" ry="10" fill="#d0e2be" opacity="0.7"/>

            <!-- Area labels -->
            <text x="25" y="20" font-family="Inter" font-size="8" font-weight="600" fill="#8b94a8">秋葉原</text>
            <text x="130" y="90" font-family="Inter" font-size="8" font-weight="600" fill="#8b94a8">東京</text>
            <text x="205" y="185" font-family="Inter" font-size="8" font-weight="600" fill="#ffffff">東京湾</text>

            <!-- Railway: JR Yamanote (Akihabara → Shinagawa) -->
            <path d="M 45 55 Q 68 72 88 88 T 140 115"
              stroke="#80ba27" stroke-width="4.5" fill="none" stroke-linecap="round"/>
            <!-- Railway: Keikyu (Shinagawa → Haneda station) -->
            <path d="M 140 115 Q 168 128 195 140 T 235 155"
              stroke="#e82c1f" stroke-width="4.5" fill="none" stroke-linecap="round"/>
            <!-- Walk (Haneda station → Gate 112) -->
            <path d="M 235 155 L 260 168"
              stroke="#6a768a" stroke-width="3" fill="none" stroke-linecap="round" stroke-dasharray="4 3"/>

            <!-- Station: 品川 (transfer) -->
            <circle cx="140" cy="115" r="7" fill="#ffffff" stroke="#2844a0" stroke-width="2.5"/>
            <circle cx="140" cy="115" r="2.5" fill="#2844a0"/>
            <rect x="115" y="122" width="50" height="13" rx="3" fill="#ffffff" stroke="#d8dde6" stroke-width="0.5"/>
            <text x="140" y="131" text-anchor="middle" font-family="Inter" font-size="7.5" font-weight="700" fill="#2844a0">品川 乗換</text>

            <!-- Station: 羽田空港第2T -->
            <circle cx="235" cy="155" r="6" fill="#ffffff" stroke="#e82c1f" stroke-width="2.5"/>
            <circle cx="235" cy="155" r="2" fill="#e82c1f"/>
            <rect x="198" y="137" width="78" height="13" rx="3" fill="#ffffff" stroke="#d8dde6" stroke-width="0.5"/>
            <text x="237" y="146" text-anchor="middle" font-family="Inter" font-size="7" font-weight="600" fill="#2844a0">羽田空港 第2T</text>

            <!-- Destination gate pin (112) -->
            <g transform="translate(260, 175)">
              <path d="M 0 -14 C -8 -14 -14 -8 -14 0 C -14 10 0 20 0 20 C 0 20 14 10 14 0 C 14 -8 8 -14 0 -14 Z" fill="#2844a0"/>
              <circle r="7" fill="#ffffff"/>
              <text y="2" text-anchor="middle" font-family="Inter" font-size="7" font-weight="700" fill="#2844a0">112</text>
            </g>

            <!-- Line name labels -->
            <rect x="68" y="70" width="44" height="11" rx="2" fill="#ffffff" opacity="0.92"/>
            <text x="90" y="78" text-anchor="middle" font-family="Inter" font-size="7" font-weight="700" fill="#80ba27">JR山手線</text>
            <rect x="170" y="125" width="32" height="11" rx="2" fill="#ffffff" opacity="0.92"/>
            <text x="186" y="133" text-anchor="middle" font-family="Inter" font-size="7" font-weight="700" fill="#e82c1f">京急線</text>
          </svg>

          <!-- Current location (Akihabara) pulsing overlay -->
          <div class="nav-current-pin" style="top: 27.5%; left: 15.6%;">
            <div class="pulse"></div>
            <div class="pulse-dot"></div>
          </div>

          <div class="nav-map-floor">広域マップ</div>
          <button class="nav-map-recenter" aria-label="recenter">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3" fill="currentColor"/><line x1="12" y1="2" x2="12" y2="4"/><line x1="12" y1="20" x2="12" y2="22"/><line x1="2" y1="12" x2="4" y2="12"/><line x1="20" y1="12" x2="22" y2="12"/></svg>
          </button>
          <div class="nav-map-scale">5km</div>
        </div>

        <!-- 2. MIDDLE: Direction -->
        <div class="nav-direction-panel">
          <div class="arrow-circle-sm">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <line x1="12" y1="19" x2="12" y2="5"/>
              <polyline points="5 12 12 5 19 12"/>
            </svg>
          </div>
          <div class="dir-text">
            <div class="sub" id="dirSub">秋葉原駅 3番線へ</div>
            <div class="main" id="dirMain">120m 直進</div>
          </div>
          <div class="dir-next">
            <div class="label">次</div>
            <div class="val" id="dirNext">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4 11h12l-4 -4"/><path d="M16 11l-4 4"/><path d="M4 4v14"/></svg>
              乗車
            </div>
            <div class="dist" id="dirDist">山手線 09:41発</div>
          </div>
        </div>

        <!-- 3. BOTTOM: Route info / progress -->
        <div class="nav-route-info">
          <div class="route-summary">
            <div class="left">
              <span class="main" id="sumMain">あと 52分</span>
              <span class="sub" id="sumSub">19.4km · 搭乗口 112 · 10:33 到着予定</span>
            </div>
            <div class="right">
              <div id="progText">進捗 5%</div>
              <div class="progress-track"><div class="fill" id="progFill" style="width: 5%;"></div></div>
            </div>
          </div>

          <div class="route-steps-label">秋葉原駅 → 搭乗口 112</div>
          <div class="route-steps-scroll">
            <div class="route-steps" id="stepsList"></div>
          </div>
        </div>

        <!-- Step advance CTA -->
        <div class="step-cta-wrap">
          <button class="step-back-btn" id="stepBack" type="button" aria-label="前のステップに戻る">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
          </button>
          <button class="step-cta-btn" id="stepCta" type="button">
            <span id="ctaLabel">秋葉原駅に到着</span>
            <span class="ic">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
            </span>
          </button>
        </div>

      </div><!-- /nav-body -->

      <!-- Completion modal -->
      <div class="nav-complete-modal" id="completeModal" role="dialog" aria-modal="true" aria-hidden="true">
        <div class="nav-complete-card">
          <img src="images/flight.svg" alt="" class="nav-complete-icon" />
          <div class="nav-complete-text">素敵な空の旅を。</div>
          <a href="main.html" class="nav-complete-cta">TOPに戻る</a>
        </div>
      </div>

      <div class="home-ind"></div>
    </div>
  </div>
</div>

<script>
(() => {
  // ---- Route legs (each one ends with the user tapping the CTA) ----
  const steps = [
    {
      name: '秋葉原駅へ向かう',
      sub: 'JR山手線 3番線まで徒歩',
      time: '09:38 → 09:41',
      train: null,
      meta: '0km',
      direction: { sub: '秋葉原駅 3番線へ', main: '120m 直進', next: '乗車', dist: '山手線 09:41発' },
      summary: { main: 'あと 52分', sub: '19.4km · 搭乗口 112 · 10:33 到着予定' },
      cta: '秋葉原駅に到着',
      progress: 5,
    },
    {
      name: 'JR山手線に乗車',
      sub: '秋葉原 → 品川 (8駅 17分)',
      time: '09:41 → 09:58',
      train: '山手線 品川行き 09:41発',
      meta: '15km',
      direction: { sub: 'JR山手線 品川行き', main: '8駅 / 17分', next: '乗換', dist: '品川駅 09:58着' },
      summary: { main: 'あと 35分', sub: '15km · 8駅 · 山手線 乗車中' },
      cta: '品川駅に到着',
      progress: 30,
    },
    {
      name: '京急線へ乗換',
      sub: '品川駅 京急2番線へ徒歩 4分',
      time: '09:58 → 10:02',
      train: null,
      meta: '15km',
      direction: { sub: '京急2番線へ', main: '徒歩 約 4分', next: '乗車', dist: '京急 10:02発' },
      summary: { main: 'あと 30分', sub: '京急2番線へ徒歩 4分' },
      cta: '京急に乗車',
      progress: 50,
    },
    {
      name: '京急エアポート快特',
      sub: '品川 → 羽田空港 第2T (13分)',
      time: '10:02 → 10:15',
      train: 'エアポート快特 羽田空港行き 10:02発',
      meta: '19km',
      direction: { sub: 'エアポート快特 羽田行き', main: '2駅 / 13分', next: '降車', dist: '羽田空港 10:15着' },
      summary: { main: 'あと 17分', sub: '4km · 京急エアポート快特 乗車中' },
      cta: '羽田空港駅に到着',
      progress: 75,
    },
    {
      name: '搭乗口112へ徒歩',
      sub: '保安検査場 経由',
      time: '10:15 → 10:33',
      train: null,
      meta: '19.4km',
      direction: { sub: '搭乗口 112 へ', main: '450m 徒歩 約18分', next: '搭乗', dist: 'NH123 12:30搭乗' },
      summary: { main: 'あと 18分', sub: '450m · 保安検査場 経由 徒歩' },
      cta: '搭乗口に到着',
      progress: 95,
    },
    {
      name: '搭乗口 112',
      sub: 'NH123 ロンドン (LHR) 行',
      time: '搭乗 12:30',
      train: null,
      meta: '完了',
      direction: { sub: 'NH123 ロンドン (LHR)', main: 'ナビ完了', next: '搭乗', dist: '12:30搭乗開始' },
      summary: { main: '到着しました', sub: '搭乗開始 12:30 · NH123' },
      cta: null,
      progress: 100,
    },
  ];

  let currentIdx = 0;

  const stepsListEl = document.getElementById('stepsList');
  const dirSubEl  = document.getElementById('dirSub');
  const dirMainEl = document.getElementById('dirMain');
  const dirNextEl = document.getElementById('dirNext');
  const dirDistEl = document.getElementById('dirDist');
  const sumMainEl = document.getElementById('sumMain');
  const sumSubEl  = document.getElementById('sumSub');
  const progFillEl = document.getElementById('progFill');
  const progTextEl = document.getElementById('progText');
  const ctaBtnEl   = document.getElementById('stepCta');
  const ctaLabelEl = document.getElementById('ctaLabel');
  const backBtnEl  = document.getElementById('stepBack');

  const clockSvg = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>';

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
  }

  function renderSteps() {
    stepsListEl.innerHTML = steps.map((s, i) => {
      const cls = ['step'];
      if (i === currentIdx) cls.push('current');
      else if (i < currentIdx) cls.push('done');
      if (i === steps.length - 1) cls.push('end');
      const trainHtml = s.train ? `<span class="train">${escapeHtml(s.train)}</span>` : '';
      const timeHtml = s.time
        ? `<div class="time">${clockSvg} ${escapeHtml(s.time)}${trainHtml}</div>`
        : '';
      return `
        <div class="${cls.join(' ')}" data-i="${i}">
          <span class="dot"></span>
          <div class="body">
            <div class="t">${escapeHtml(s.name)}</div>
            <div class="s">${escapeHtml(s.sub)}</div>
            ${timeHtml}
          </div>
          <div class="meta">${escapeHtml(s.meta)}</div>
        </div>`;
    }).join('');
  }

  function render() {
    const s = steps[currentIdx];
    dirSubEl.textContent  = s.direction.sub;
    dirMainEl.textContent = s.direction.main;
    dirNextEl.lastChild.textContent = ' ' + s.direction.next;
    dirDistEl.textContent = s.direction.dist;
    sumMainEl.textContent = s.summary.main;
    sumSubEl.textContent  = s.summary.sub;
    progFillEl.style.width = s.progress + '%';
    progTextEl.textContent = '進捗 ' + s.progress + '%';

    if (s.cta) {
      ctaLabelEl.textContent = s.cta;
      ctaBtnEl.disabled = false;
    } else {
      ctaLabelEl.textContent = 'ナビ完了';
      ctaBtnEl.disabled = true;
    }
    backBtnEl.disabled = (currentIdx === 0);

    renderSteps();
  }

  function focusCurrentStep() {
    const el = stepsListEl.querySelector(`[data-i="${currentIdx}"]`);
    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }

  const completeModal = document.getElementById('completeModal');
  let completeTimer = null;

  function showCompleteModal() {
    completeModal.classList.add('open');
    completeModal.setAttribute('aria-hidden', 'false');
  }
  function hideCompleteModal() {
    completeModal.classList.remove('open');
    completeModal.setAttribute('aria-hidden', 'true');
    if (completeTimer) {
      clearTimeout(completeTimer);
      completeTimer = null;
    }
  }

  ctaBtnEl.addEventListener('click', () => {
    if (currentIdx < steps.length - 1) {
      currentIdx++;
      render();
      focusCurrentStep();
      if (currentIdx === steps.length - 1) {
        if (completeTimer) clearTimeout(completeTimer);
        completeTimer = setTimeout(showCompleteModal, 1000);
      }
    }
  });

  backBtnEl.addEventListener('click', () => {
    if (currentIdx > 0) {
      currentIdx--;
      render();
      focusCurrentStep();
      hideCompleteModal();
    }
  });

  render();
})();
</script>
</body>
</html>
