<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>HANEDA — ナビゲート中</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Noto+Sans+JP:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="styles.css" />
</head>
<body>
<div class="flow-hint">⑥ リアルタイムナビ (ナビ画面)</div>
<div class="stage">
  <div class="phone">
    <div class="screen screen-nav">
      <div class="status-bar">
        <span>9:41</span>
        <div class="status-icons">
          <svg viewBox="0 0 16 11" fill="none"><path d="M1 7c0-.6.4-1 1-1h1c.6 0 1 .4 1 1v3c0 .6-.4 1-1 1H2c-.6 0-1-.4-1-1V7zm5-2c0-.6.4-1 1-1h1c.6 0 1 .4 1 1v5c0 .6-.4 1-1 1H7c-.6 0-1-.4-1-1V5zm5-3c0-.6.4-1 1-1h1c.6 0 1 .4 1 1v8c0 .6-.4 1-1 1h-1c-.6 0-1-.4-1-1V2z" fill="currentColor"/></svg>
          <svg viewBox="0 0 16 11" fill="none"><path d="M8 2c2.2 0 4.2.8 5.8 2.2l-1.4 1.4C11.1 4.5 9.6 4 8 4s-3.1.5-4.4 1.6L2.2 4.2C3.8 2.8 5.8 2 8 2zM8 6c1.1 0 2.1.4 2.9 1l-1.4 1.4C9.1 8.1 8.6 8 8 8c-.6 0-1.1.1-1.5.4L5.1 7c.8-.6 1.8-1 2.9-1zm0 3c.6 0 1 .4 1 1s-.4 1-1 1-1-.4-1-1 .4-1 1-1z" fill="currentColor"/></svg>
          <svg viewBox="0 0 22 11" fill="none"><rect x="1" y="1" width="18" height="9" rx="2" stroke="currentColor" stroke-opacity="0.4"/><rect x="2" y="2" width="16" height="7" rx="1" fill="currentColor"/><rect x="20" y="4" width="1.5" height="3" rx="0.5" fill="currentColor" opacity="0.4"/></svg>
        </div>
      </div>

      <div class="sub-header">
        <a href="route.html" class="icon-btn" aria-label="back">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
        </a>
        <div class="title">ナビゲート中</div>
        <button class="icon-btn" aria-label="settings">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        </button>
      </div>

      <div class="nav-body">

        <!-- 1. TOP: Wide-area transit map (Akihabara → Haneda) -->
        <div class="nav-map">
          <svg class="nav-map-svg" viewBox="0 0 288 200" preserveAspectRatio="xMidYMid meet">
            <defs>
              <linearGradient id="bayGrad" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0" stop-color="#c5dcee"/>
                <stop offset="1" stop-color="#a5c1dc"/>
              </linearGradient>
            </defs>

            <!-- Land background -->
            <rect width="288" height="200" fill="#e8ede4"/>

            <!-- Tokyo Bay (bottom-right) -->
            <path d="M 170 200 L 170 160 Q 200 148 230 148 L 250 130 L 288 122 L 288 200 Z" fill="url(#bayGrad)"/>

            <!-- Haneda Airport island -->
            <path d="M 225 150 L 268 146 L 282 168 L 268 190 L 230 188 Z" fill="#d6dde6" stroke="#b4bcc8" stroke-width="0.4"/>
            <rect x="242" y="163" width="36" height="2" fill="#a0a8b8" transform="rotate(-8 260 164)"/>

            <!-- Subtle road network -->
            <g opacity="0.35" stroke="#ffffff" stroke-linecap="round" fill="none">
              <path d="M 0 30 L 288 60" stroke-width="1.8"/>
              <path d="M 0 95 L 180 140" stroke-width="1.8"/>
              <path d="M 70 0 L 100 200" stroke-width="1.3"/>
              <path d="M 180 0 L 160 160" stroke-width="1.3"/>
            </g>

            <!-- Parks -->
            <ellipse cx="100" cy="26" rx="26" ry="12" fill="#d0e2be" opacity="0.75"/>
            <ellipse cx="190" cy="68" rx="22" ry="10" fill="#d0e2be" opacity="0.7"/>

            <!-- Area labels -->
            <text x="25" y="20" font-family="Inter" font-size="8" font-weight="600" fill="#8b94a8">秋葉原</text>
            <text x="130" y="90" font-family="Inter" font-size="8" font-weight="600" fill="#8b94a8">東京</text>
            <text x="205" y="185" font-family="Inter" font-size="8" font-weight="600" fill="#ffffff">東京湾</text>

            <!-- Railway: JR Yamanote (Akihabara → Shinagawa) -->
            <path d="M 45 55 Q 68 72 88 88 T 140 115"
              stroke="#80ba27" stroke-width="4.5" fill="none" stroke-linecap="round"/>
            <!-- Railway: Keikyu (Shinagawa → Haneda station) -->
            <path d="M 140 115 Q 168 128 195 140 T 235 155"
              stroke="#e82c1f" stroke-width="4.5" fill="none" stroke-linecap="round"/>
            <!-- Walk (Haneda station → Gate 112) -->
            <path d="M 235 155 L 260 168"
              stroke="#6a768a" stroke-width="3" fill="none" stroke-linecap="round" stroke-dasharray="4 3"/>

            <!-- Station: 品川 (transfer) -->
            <circle cx="140" cy="115" r="7" fill="#ffffff" stroke="#2844a0" stroke-width="2.5"/>
            <circle cx="140" cy="115" r="2.5" fill="#2844a0"/>
            <rect x="115" y="122" width="50" height="13" rx="3" fill="#ffffff" stroke="#d8dde6" stroke-width="0.5"/>
            <text x="140" y="131" text-anchor="middle" font-family="Inter" font-size="7.5" font-weight="700" fill="#2844a0">品川 乗換</text>

            <!-- Station: 羽田空港第2T -->
            <circle cx="235" cy="155" r="6" fill="#ffffff" stroke="#e82c1f" stroke-width="2.5"/>
            <circle cx="235" cy="155" r="2" fill="#e82c1f"/>
            <rect x="198" y="137" width="78" height="13" rx="3" fill="#ffffff" stroke="#d8dde6" stroke-width="0.5"/>
            <text x="237" y="146" text-anchor="middle" font-family="Inter" font-size="7" font-weight="600" fill="#2844a0">羽田空港 第2T</text>

            <!-- Destination gate pin (112) -->
            <g transform="translate(260, 175)">
              <path d="M 0 -14 C -8 -14 -14 -8 -14 0 C -14 10 0 20 0 20 C 0 20 14 10 14 0 C 14 -8 8 -14 0 -14 Z" fill="#2844a0"/>
              <circle r="7" fill="#ffffff"/>
              <text y="2" text-anchor="middle" font-family="Inter" font-size="7" font-weight="700" fill="#2844a0">112</text>
            </g>

            <!-- Line name labels -->
            <rect x="68" y="70" width="44" height="11" rx="2" fill="#ffffff" opacity="0.92"/>
            <text x="90" y="78" text-anchor="middle" font-family="Inter" font-size="7" font-weight="700" fill="#80ba27">JR山手線</text>
            <rect x="170" y="125" width="32" height="11" rx="2" fill="#ffffff" opacity="0.92"/>
            <text x="186" y="133" text-anchor="middle" font-family="Inter" font-size="7" font-weight="700" fill="#e82c1f">京急線</text>
          </svg>

          <!-- Current location (Akihabara) pulsing overlay -->
          <div class="nav-current-pin" style="top: 27.5%; left: 15.6%;">
            <div class="pulse"></div>
            <div class="pulse-dot"></div>
          </div>

          <div class="nav-map-floor">広域マップ</div>
          <button class="nav-map-recenter" aria-label="recenter">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3" fill="currentColor"/><line x1="12" y1="2" x2="12" y2="4"/><line x1="12" y1="20" x2="12" y2="22"/><line x1="2" y1="12" x2="4" y2="12"/><line x1="20" y1="12" x2="22" y2="12"/></svg>
          </button>
          <div class="nav-map-scale">5km</div>
        </div>

        <!-- 2. MIDDLE: Direction -->
        <div class="nav-direction-panel">
          <div class="arrow-circle-sm">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <line x1="12" y1="19" x2="12" y2="5"/>
              <polyline points="5 12 12 5 19 12"/>
            </svg>
          </div>
          <div class="dir-text">
            <div class="sub">秋葉原駅 3番線へ</div>
            <div class="main"><span>120</span>m 直進</div>
          </div>
          <div class="dir-next">
            <div class="label">次</div>
            <div class="val">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4 11h12l-4 -4"/><path d="M16 11l-4 4"/><path d="M4 4v14"/></svg>
              乗車
            </div>
            <div class="dist">山手線 09:41発</div>
          </div>
        </div>

        <!-- 3. BOTTOM: Route info / progress -->
        <div class="nav-route-info">
          <div class="route-summary">
            <div class="left">
              <span class="main">あと 52分</span>
              <span class="sub">19.4km · 搭乗口 112 · 10:33 到着予定</span>
            </div>
            <div class="right">
              <div>進捗 5%</div>
              <div class="progress-track"><div class="fill" style="width: 5%;"></div></div>
            </div>
          </div>

          <div class="route-steps-label">秋葉原駅 → 搭乗口 112</div>
          <div class="route-steps">
            <div class="step current">
              <span class="dot"></span>
              <div class="body">
                <div class="t">秋葉原駅</div>
                <div class="s">現在地 · JR山手線 3番線 09:41発</div>
              </div>
              <div class="meta">
                0km
              </div>
            </div>
            <div class="step">
              <span class="dot"></span>
              <div class="body">
                <div class="t">品川駅</div>
                <div class="s">09:58着 · 乗換4分 · 京急2番線</div>
              </div>
              <div class="meta">
                15km
              </div>
            </div>
            <div class="step">
              <span class="dot"></span>
              <div class="body">
                <div class="t">羽田空港 第2ターミナル駅</div>
                <div class="s">10:15着 · 京急エアポート快特</div>
              </div>
              <div class="meta">
                19km
              </div>
            </div>
            <div class="step end">
              <span class="dot"></span>
              <div class="body">
                <div class="t">搭乗口 112</div>
                <div class="s">NH123 ロンドン (LHR) 行 · 徒歩18分</div>
              </div>
              <div class="meta">
                19.4km
              </div>
            </div>
          </div>
        </div>

      </div><!-- /nav-body -->

      <div class="nav-bottom">
        <a href="route.html" class="nav-btn">
          <div class="icn">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><circle cx="12" cy="12" r="3"/></svg>
          </div>
          <span>経路を再検索</span>
        </a>
        <button class="nav-btn pause">
          <div class="icn">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
          </div>
          <span>一時停止</span>
        </button>
        <a href="main.html" class="nav-btn">
          <div class="icn">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </div>
          <span>ナビを終了</span>
        </a>
      </div>

      <div class="home-ind"></div>
    </div>
  </div>
</div>
</body>
</html>
