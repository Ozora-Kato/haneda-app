<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>HANEDA — ログイン</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Noto+Sans+JP:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="styles.css" />
</head>
<body>
<div class="flow-hint">① ログイン画面</div>
<div class="stage">
  <div class="phone">
    <div class="screen screen-login">
      <div class="login-sky"></div>
      <div class="login-water"></div>
      <div class="login-airport"></div>
      <div class="login-tower"></div>

      <svg class="login-plane" width="52" height="20" viewBox="0 0 46 18" fill="none">
        <path d="M2 9 L44 6 L42 10 L28 11 L22 16 L18 15 L20 11 L10 11 L6 13 L2 12 Z" fill="currentColor"/>
      </svg>

      <div class="status-bar light">
        <span>9:41</span>
        <div class="status-icons">
          <svg viewBox="0 0 16 11" fill="none"><path d="M1 7c0-.6.4-1 1-1h1c.6 0 1 .4 1 1v3c0 .6-.4 1-1 1H2c-.6 0-1-.4-1-1V7zm5-2c0-.6.4-1 1-1h1c.6 0 1 .4 1 1v5c0 .6-.4 1-1 1H7c-.6 0-1-.4-1-1V5zm5-3c0-.6.4-1 1-1h1c.6 0 1 .4 1 1v8c0 .6-.4 1-1 1h-1c-.6 0-1-.4-1-1V2z" fill="currentColor"/></svg>
          <svg viewBox="0 0 16 11" fill="none"><path d="M8 2c2.2 0 4.2.8 5.8 2.2l-1.4 1.4C11.1 4.5 9.6 4 8 4s-3.1.5-4.4 1.6L2.2 4.2C3.8 2.8 5.8 2 8 2zM8 6c1.1 0 2.1.4 2.9 1l-1.4 1.4C9.1 8.1 8.6 8 8 8c-.6 0-1.1.1-1.5.4L5.1 7c.8-.6 1.8-1 2.9-1zm0 3c.6 0 1 .4 1 1s-.4 1-1 1-1-.4-1-1 .4-1 1-1z" fill="currentColor"/></svg>
          <svg viewBox="0 0 22 11" fill="none"><rect x="1" y="1" width="18" height="9" rx="2" stroke="currentColor" stroke-opacity="0.5"/><rect x="2" y="2" width="16" height="7" rx="1" fill="currentColor"/><rect x="20" y="4" width="1.5" height="3" rx="0.5" fill="currentColor" opacity="0.5"/></svg>
        </div>
      </div>

      <div class="login-brand">
        <svg width="72" height="72" viewBox="0 0 68 68" fill="none" style="margin: 0 auto;">
          <path d="M16 10 L16 58 M52 10 L52 58 M16 34 L52 34" stroke="white" stroke-width="4" stroke-linecap="square"/>
        </svg>
        <div class="brand-name">HANEDA</div>
        <div class="brand-sub">Tokyo International Airport</div>
      </div>

      <div class="login-actions">
        <a href="main.html" class="btn-primary">
          <span></span>
          <span>ログイン / Login</span>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
        </a>
        <a href="main.html" class="btn-ghost">
          <span></span>
          <span>新規登録 / Sign up</span>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
        </a>
        <a href="main.html" class="login-guest">ゲストで使う / Continue as Guest</a>
      </div>

      <div class="home-ind light"></div>
    </div>
  </div>
</div>
</body>
</html>
