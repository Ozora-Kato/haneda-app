<!DOCTYPE html>

<head>

<body>
<div class="flow-hint">② メインUI (検索画面)</div>
<div class="stage">
  <div class="phone">
    <div class="screen screen-main">
      <div class="status-bar">
        <span>9:41</span>
        <div class="status-icons">
          <svg viewBox="0 0 16 11" fill="none"><path d="M1 7c0-.6.4-1 1-1h1c.6 0 1 .4 1 1v3c0 .6-.4 1-1 1H2c-.6 0-1-.4-1-1V7zm5-2c0-.6.4-1 1-1h1c.6 0 1 .4 1 1v5c0 .6-.4 1-1 1H7c-.6 0-1-.4-1-1V5zm5-3c0-.6.4-1 1-1h1c.6 0 1 .4 1 1v8c0 .6-.4 1-1 1h-1c-.6 0-1-.4-1-1V2z" fill="currentColor"/></svg>
          <svg viewBox="0 0 16 11" fill="none"><path d="M8 2c2.2 0 4.2.8 5.8 2.2l-1.4 1.4C11.1 4.5 9.6 4 8 4s-3.1.5-4.4 1.6L2.2 4.2C3.8 2.8 5.8 2 8 2zM8 6c1.1 0 2.1.4 2.9 1l-1.4 1.4C9.1 8.1 8.6 8 8 8c-.6 0-1.1.1-1.5.4L5.1 7c.8-.6 1.8-1 2.9-1zm0 3c.6 0 1 .4 1 1s-.4 1-1 1-1-.4-1-1 .4-1 1-1z" fill="currentColor"/></svg>

      <div class="main-body">

        </button>

      <div class="greeting">

          Good Morning
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#2844a0" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M17.8 19.2 16 11l3.5-3.5C21 6 21.5 4 21 3c-1-.5-3 0-4.5 1.5L13 8 4.8 6.2c-.5-.1-.9.1-1.1.5l-.3.5c-.2.5-.1 1 .3 1.3L9 12l-2 3H4l-1 1 3 2 2 3 1-1v-3l3-2 3.5 5.3c.3.4.8.5 1.3.3l.5-.2c.4-.3.6-.7.5-1.2z"/></svg>
        </h2>
        <p>快適なご旅行をサポートします</p>
      </div>

      <form class="search-card" onsubmit="event.preventDefault(); window.location.href='route-results.html';">
        <div class="field">
          <div class="field-label">フライトナンバー</div>
          <div class="field-input">
            <div class="lead"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.8 19.2 16 11l3.5-3.5C21 6 21.5 4 21 3c-1-.5-3 0-4.5 1.5L13 8 4.8 6.2c-.5-.1-.9.1-1.1.5l-.3.5c-.2.5-.1 1 .3 1.3L9 12l-2 3H4l-1 1 3 2 2 3 1-1v-3l3-2 3.5 5.3c.3.4.8.5 1.3.3l.5-.2c.4-.3.6-.7.5-1.2z"/></svg></div>
            <input id="flightInput" type="text" placeholder="例) NH123" autocomplete="off" />
            <button type="button" id="flightClear" class="trail trail-btn" aria-label="クリア" hidden>

        <div class="field">

          <a href="location.html" class="field-input field-select">

            </div>
            <span class="field-value is-placeholder" id="locationValue">現在地を選択する</span>
            <div class="trail"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg></div>
          </a>
        </div>

        <div class="field">
          <div class="field-label">日時</div>
          <button type="button" class="field-input field-select" id="datetimeOpen">
            <div class="lead lead-locate">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
            </div>
            <span class="field-value" id="datetimeValue"></span>
            <div class="trail"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg></div>
          </button>
        </div>

        <div class="field">
          <div class="field-label">条件</div>
          <div class="cond-row">
            <button type="button" class="cond-cell" id="condSpeed">
              <span class="cond-ic" id="condSpeedIcon"></span>
              <span class="cond-tx" id="condSpeedText"></span>
            </button>
            <button type="button" class="cond-cell" id="condTaxi">
              <span class="cond-ic" id="condTaxiIcon"></span>
              <span class="cond-tx" id="condTaxiText"></span>
            </button>
            <button type="button" class="cond-cell" id="condBus">
              <span class="cond-ic" id="condBusIcon"></span>
              <span class="cond-tx" id="condBusText"></span>
            </button>
          </div>
        </div>

        <button class="btn-search" type="submit">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          検索する
        </button>
      </form>

      <div class="recent">
        <div class="recent-header">
          <span class="t">最近の検索</span>
        </div>
        <a href="route-results.html" class="recent-item">
          <span class="code">NH123</span>
          <span class="route">東京 (羽田) → ロンドン (LHR)</span>
          <svg class="chev" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
        </a>
        <a href="route-results.html" class="recent-item">
          <span class="code">JL45</span>
          <span class="route">東京 (羽田) → パリ (CDG)</span>
          <svg class="chev" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
        </a>
        <a href="route-results.html" class="recent-item">
          <span class="code">NH67</span>
          <span class="route">東京 (羽田) → シンガポール (SIN)</span>
          <svg class="chev" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
        </a>
      </div>
      </div><!-- /main-body -->

      <nav class="bottom-nav">
        <a href="main.html" class="nav-item active">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
          <span>トップ</span>
        </a>
        <a href="route-results.html" class="nav-item">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.8 19.2 16 11l3.5-3.5C21 6 21.5 4 21 3c-1-.5-3 0-4.5 1.5L13 8 4.8 6.2c-.5-.1-.9.1-1.1.5l-.3.5c-.2.5-.1 1 .3 1.3L9 12l-2 3H4l-1 1 3 2 2 3 1-1v-3l3-2 3.5 5.3c.3.4.8.5 1.3.3l.5-.2c.4-.3.6-.7.5-1.2z"/></svg>
          <span>フライト検索</span>
        </a>
        <a href="#" class="nav-item">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          <span>マイページ</span>
        </a>
      </nav>

      <div class="home-ind"></div>

      <!-- Date/time picker modal -->
      <div class="dt-modal" id="dtModal" aria-hidden="true">
        <div class="dt-backdrop" id="dtBackdrop"></div>
        <div class="dt-sheet" role="dialog" aria-modal="true" aria-labelledby="dtTitle">
          <div class="dt-handle"></div>
          <div class="dt-header">
            <button type="button" class="dt-cancel" id="dtCancel">キャンセル</button>
            <h3 id="dtTitle">日時を選択</h3>
            <span class="dt-spacer"></span>
          </div>

          <div class="dt-toggle" role="tablist">
            <button type="button" class="dt-toggle-btn active" data-mode="depart" role="tab">出発</button>
            <button type="button" class="dt-toggle-btn" data-mode="arrive" role="tab">到着</button>
          </div>

          <div class="dt-picker">
            <div class="dt-wheel" id="wheelDate" data-key="date"></div>
            <div class="dt-wheel" id="wheelHour" data-key="hour"></div>
            <div class="dt-wheel-sep" aria-hidden="true">:</div>
            <div class="dt-wheel" id="wheelMinute" data-key="minute"></div>
            <div class="dt-indicator" aria-hidden="true"></div>
          </div>

          <div class="dt-footer">
            <button type="button" class="dt-done" id="dtDone">完了</button>
          </div>
        </div>
      </div>

      <!-- Speed picker modal (drum-roll) -->
      <div class="dt-modal" id="speedModal" aria-hidden="true">
        <div class="dt-backdrop" data-dismiss="speedModal"></div>
        <div class="dt-sheet" role="dialog" aria-modal="true">
          <div class="dt-handle"></div>
          <div class="dt-header">
            <button type="button" class="dt-cancel" data-dismiss="speedModal">キャンセル</button>
            <h3>歩く速度</h3>
            <span class="dt-spacer"></span>
          </div>
          <div class="dt-picker single">
            <div class="dt-wheel" id="wheelSpeed"></div>
            <div class="dt-indicator" aria-hidden="true"></div>
          </div>
          <div class="dt-footer">
            <button type="button" class="dt-done" id="speedDone">完了</button>
          </div>
        </div>
      </div>

      <!-- Taxi modal (option list) -->
      <div class="dt-modal" id="taxiModal" aria-hidden="true">
        <div class="dt-backdrop" data-dismiss="taxiModal"></div>
        <div class="dt-sheet" role="dialog" aria-modal="true">
          <div class="dt-handle"></div>
          <div class="dt-header">
            <button type="button" class="dt-cancel" data-dismiss="taxiModal">キャンセル</button>
            <h3>タクシー利用</h3>
            <span class="dt-spacer"></span>
          </div>
          <ul class="opt-list" id="taxiList"></ul>
          <div class="dt-footer">
            <button type="button" class="dt-done" id="taxiDone">完了</button>
          </div>
        </div>
      </div>

      <!-- Bus modal (option list) -->
      <div class="dt-modal" id="busModal" aria-hidden="true">
        <div class="dt-backdrop" data-dismiss="busModal"></div>
        <div class="dt-sheet" role="dialog" aria-modal="true">
          <div class="dt-handle"></div>
          <div class="dt-header">
            <button type="button" class="dt-cancel" data-dismiss="busModal">キャンセル</button>
            <h3>バス利用</h3>
            <span class="dt-spacer"></span>
          </div>
          <ul class="opt-list" id="busList"></ul>
          <div class="dt-footer">
            <button type="button" class="dt-done" id="busDone">完了</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
(() => {
  const DAYS_JA = ['日','月','火','水','木','金','土'];
  const pad2 = (n) => String(n).padStart(2, '0');
  const fmtFull = (d) => `${d.getMonth()+1}月${d.getDate()}日 (${DAYS_JA[d.getDay()]})`;
  const fmtShort = (d) => `${d.getMonth()+1}/${d.getDate()} (${DAYS_JA[d.getDay()]})`;

  // ---- Generate picker data ----
  const startOfToday = new Date();
  startOfToday.setHours(0, 0, 0, 0);
  const RANGE_BACK = 1;     // include yesterday
  const RANGE_AHEAD = 90;   // 90 days ahead
  const datesData = [];
  for (let i = -RANGE_BACK; i <= RANGE_AHEAD; i++) {
    const d = new Date(startOfToday);
    d.setDate(startOfToday.getDate() + i);
    datesData.push({ date: d, full: fmtFull(d), short: fmtShort(d) });
  }
  const todayIdx = RANGE_BACK; // index of today
  const hoursData = Array.from({length: 24}, (_, i) => pad2(i));
  const minutesData = Array.from({length: 12}, (_, i) => pad2(i * 5));

  const ITEM_H = 40;
  const WHEEL_H = 200;
  const PAD = (WHEEL_H - ITEM_H) / 2; // 80

  function buildWheel(wheelEl, items, getLabel) {
    const ul = document.createElement('ul');
    ul.className = 'dt-options';
    items.forEach((it, i) => {
      const li = document.createElement('li');
      li.textContent = getLabel ? getLabel(it) : it;
      li.dataset.index = i;
      ul.appendChild(li);
    });
    wheelEl.innerHTML = '';
    wheelEl.appendChild(ul);
  }

  function snapTo(wheelEl, idx) {
    wheelEl.scrollTop = idx * ITEM_H;
    updateAria(wheelEl);
  }

  function selectedIndex(wheelEl) {
    return Math.max(0, Math.round(wheelEl.scrollTop / ITEM_H));
  }

  function updateAria(wheelEl) {
    const idx = selectedIndex(wheelEl);
    wheelEl.querySelectorAll('li').forEach((li, i) => {
      li.setAttribute('aria-current', i === idx ? 'true' : 'false');
    });
  }

  // ---- Build wheels ----
  const wheels = {
    date:   document.getElementById('wheelDate'),
    hour:   document.getElementById('wheelHour'),
    minute: document.getElementById('wheelMinute'),
  };
  buildWheel(wheels.date, datesData, (d) => d.short);
  buildWheel(wheels.hour, hoursData);
  buildWheel(wheels.minute, minutesData);

  // ---- State ----
  const now = new Date();
  let state = {
    dateIdx: todayIdx,
    hourIdx: now.getHours(),
    minuteIdx: Math.round(now.getMinutes() / 5) % minutesData.length,
    mode: 'depart', // 'depart' | 'arrive'
  };

  // ---- Display ----
  const datetimeValueEl = document.getElementById('datetimeValue');
  function renderField() {
    const d = datesData[state.dateIdx].full;
    const h = hoursData[state.hourIdx];
    const m = minutesData[state.minuteIdx];
    const mode = state.mode === 'depart' ? '出発' : '到着';
    datetimeValueEl.textContent = `${d} ${h}:${m} ${mode}`;
  }
  renderField();

  // ---- Modal open/close ----
  const modal = document.getElementById('dtModal');
  const openBtn = document.getElementById('datetimeOpen');
  const cancelBtn = document.getElementById('dtCancel');
  const backdropEl = document.getElementById('dtBackdrop');
  const doneBtn = document.getElementById('dtDone');

  // Snap wheel scroll on selection update
  Object.values(wheels).forEach((w) => {
    let timer;
    w.addEventListener('scroll', () => {
      clearTimeout(timer);
      timer = setTimeout(() => updateAria(w), 60);
    });
  });

  // Toggle (depart/arrive)
  document.querySelectorAll('.dt-toggle-btn').forEach((btn) => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.dt-toggle-btn').forEach((b) => b.classList.remove('active'));
      btn.classList.add('active');
      state.mode = btn.dataset.mode;
    });
  });

  function openModal() {
    modal.classList.add('open');
    modal.setAttribute('aria-hidden', 'false');
    document.body.classList.add('modal-open');
    // Sync wheels to state
    requestAnimationFrame(() => {
      snapTo(wheels.date, state.dateIdx);
      snapTo(wheels.hour, state.hourIdx);
      snapTo(wheels.minute, state.minuteIdx);
    });
    // Sync toggle
    document.querySelectorAll('.dt-toggle-btn').forEach((b) => {
      b.classList.toggle('active', b.dataset.mode === state.mode);
    });
  }
  function closeModal() {
    modal.classList.remove('open');
    modal.setAttribute('aria-hidden', 'true');
    document.body.classList.remove('modal-open');
  }

  openBtn.addEventListener('click', openModal);
  cancelBtn.addEventListener('click', closeModal);
  backdropEl.addEventListener('click', closeModal);
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape' && modal.classList.contains('open')) closeModal();
  });

  doneBtn.addEventListener('click', () => {
    state.dateIdx = selectedIndex(wheels.date);
    state.hourIdx = selectedIndex(wheels.hour);
    state.minuteIdx = selectedIndex(wheels.minute);
    renderField();
    closeModal();
  });

  // ---- Flight number clear ----
  const flightInput = document.getElementById('flightInput');
  const flightClear = document.getElementById('flightClear');
  function syncFlightClear() {
    flightClear.hidden = !flightInput.value;
  }
  flightInput.addEventListener('input', syncFlightClear);
  flightClear.addEventListener('click', () => {
    flightInput.value = '';
    syncFlightClear();
    flightInput.focus();
  });
  syncFlightClear();

  // ---- Current location: read from localStorage ----
  const locEl = document.getElementById('locationValue');
  const stored = localStorage.getItem('haneda:location');
  if (stored) {
    locEl.textContent = stored;
    locEl.classList.remove('is-placeholder');
  } else {
    locEl.textContent = '現在地を選択する';
    locEl.classList.add('is-placeholder');
  }

  // ============================================
  // Conditions: speed / taxi / bus
  // ============================================
  const ICONS = {
    // speed
    speedFast: '<svg viewBox="0 0 24 24"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2" fill="currentColor"/></svg>',
    speedSlightlyFast: '<svg viewBox="0 0 24 24"><polygon points="13 19 22 12 13 5 13 19" fill="currentColor"/><polygon points="2 19 11 12 2 5 2 19" fill="currentColor"/></svg>',
    speedSlightlySlow: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>',
    speedSlow: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>',
    // taxi
    taxiDefault: '<svg viewBox="0 0 24 24" fill="currentColor"><circle cx="6" cy="12" r="1.6"/><circle cx="12" cy="12" r="1.6"/><circle cx="18" cy="12" r="1.6"/></svg>',
    taxiOnly: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 16H9m10 0h3v-3.15a1 1 0 0 0-.84-.99L16 11l-2.7-3.6a1 1 0 0 0-.8-.4H5.24a2 2 0 0 0-1.8 1.1l-.8 1.63A6 6 0 0 0 2 12.42V16h2"/><circle cx="6.5" cy="16.5" r="2"/><circle cx="16.5" cy="16.5" r="2"/></svg>',
    taxiNo: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 16H9m10 0h3v-3.15a1 1 0 0 0-.84-.99L16 11l-2.7-3.6a1 1 0 0 0-.8-.4H5.24a2 2 0 0 0-1.8 1.1l-.8 1.63"/><circle cx="6.5" cy="16.5" r="2"/><circle cx="16.5" cy="16.5" r="2"/><line x1="3" y1="3" x2="21" y2="21"/></svg>',
    // bus
    busDefault: '<svg viewBox="0 0 24 24" fill="currentColor"><circle cx="6" cy="12" r="1.6"/><circle cx="12" cy="12" r="1.6"/><circle cx="18" cy="12" r="1.6"/></svg>',
    busNo: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 6v5"/><path d="M15 6v5"/><path d="M2 12h19"/><path d="M18 18h3v-3l-1.4-5C19 7.8 18 7 17 7H5a2 2 0 0 0-2 2v9h3"/><circle cx="7" cy="18" r="1.5"/><circle cx="17" cy="18" r="1.5"/><line x1="3" y1="3" x2="21" y2="21"/></svg>',
  };

  const speedOpts = [
    { full: '急いで',       short: '急いで',       icon: 'speedFast' },
    { full: '少し急いで',   short: '少し急ぎ',     icon: 'speedSlightlyFast' },
    { full: '少しゆっくり', short: '少しゆっくり', icon: 'speedSlightlySlow' },
    { full: 'ゆっくり',     short: 'ゆっくり',     icon: 'speedSlow' },
  ];
  const taxiOpts = [
    { full: '指定なし',             short: '指定なし',     icon: 'taxiDefault' },
    { full: 'タクシーを利用しない', short: '利用しない',   icon: 'taxiNo' },
    { full: 'タクシーのみで移動',   short: 'タクシーのみ', icon: 'taxiOnly' },
  ];
  const busOpts = [
    { full: '指定なし',         short: '指定なし',   icon: 'busDefault' },
    { full: 'バスを利用しない', short: '利用しない', icon: 'busNo' },
  ];

  const condState = { speed: 1, taxi: 0, bus: 0 };
  let pending = { taxi: 0, bus: 0 };

  function setCellContent(idIcon, idText, opts, idx) {
    document.getElementById(idIcon).innerHTML = ICONS[opts[idx].icon];
    document.getElementById(idText).textContent = opts[idx].short;
  }
  function renderCond() {
    setCellContent('condSpeedIcon', 'condSpeedText', speedOpts, condState.speed);
    setCellContent('condTaxiIcon',  'condTaxiText',  taxiOpts,  condState.taxi);
    setCellContent('condBusIcon',   'condBusText',   busOpts,   condState.bus);

    const speedCell = document.getElementById('condSpeed');
    const taxiCell  = document.getElementById('condTaxi');
    const busCell   = document.getElementById('condBus');
    const taxiOnly = (condState.taxi === 2);

    speedCell.classList.toggle('disabled', taxiOnly);
    busCell.classList.toggle('disabled',   taxiOnly);
    taxiCell.classList.toggle('soft', condState.taxi === 1);
    busCell.classList.toggle('soft', !taxiOnly && condState.bus === 1);
  }

  // ---- Generic sheet open/close (used by speed/taxi/bus modals) ----
  function openSheet(id) {
    const m = document.getElementById(id);
    m.classList.add('open');
    m.setAttribute('aria-hidden', 'false');
    document.body.classList.add('modal-open');
  }
  function closeSheet(id) {
    const m = document.getElementById(id);
    m.classList.remove('open');
    m.setAttribute('aria-hidden', 'true');
    document.body.classList.remove('modal-open');
  }
  document.querySelectorAll('[data-dismiss]').forEach((el) => {
    el.addEventListener('click', () => closeSheet(el.dataset.dismiss));
  });

  // ---- Speed modal (drum-roll) ----
  const wheelSpeed = document.getElementById('wheelSpeed');
  buildWheel(wheelSpeed, speedOpts, (o) => o.full);
  let speedTimer;
  wheelSpeed.addEventListener('scroll', () => {
    clearTimeout(speedTimer);
    speedTimer = setTimeout(() => updateAria(wheelSpeed), 60);
  });
  document.getElementById('condSpeed').addEventListener('click', () => {
    if (document.getElementById('condSpeed').classList.contains('disabled')) return;
    openSheet('speedModal');
    requestAnimationFrame(() => snapTo(wheelSpeed, condState.speed));
  });
  document.getElementById('speedDone').addEventListener('click', () => {
    condState.speed = selectedIndex(wheelSpeed);
    renderCond();
    closeSheet('speedModal');
  });

  // ---- Taxi / Bus option list modals ----
  function buildOptList(listEl, opts, currentIdx, onPick) {
    listEl.innerHTML = '';
    opts.forEach((opt, i) => {
      const li = document.createElement('li');
      li.className = 'opt-item' + (i === currentIdx ? ' selected' : '');
      li.dataset.index = i;
      li.innerHTML = `
        <span class="opt-label">${opt.full}</span>
        <svg class="opt-check" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
      `;
      li.addEventListener('click', () => {
        listEl.querySelectorAll('.opt-item').forEach((x) => x.classList.remove('selected'));
        li.classList.add('selected');
        onPick(i);
      });
      listEl.appendChild(li);
    });
  }

  document.getElementById('condTaxi').addEventListener('click', () => {
    pending.taxi = condState.taxi;
    buildOptList(document.getElementById('taxiList'), taxiOpts, condState.taxi, (i) => { pending.taxi = i; });
    openSheet('taxiModal');
  });
  document.getElementById('taxiDone').addEventListener('click', () => {
    condState.taxi = pending.taxi;
    renderCond();
    closeSheet('taxiModal');
  });

  document.getElementById('condBus').addEventListener('click', () => {
    if (document.getElementById('condBus').classList.contains('disabled')) return;
    pending.bus = condState.bus;
    buildOptList(document.getElementById('busList'), busOpts, condState.bus, (i) => { pending.bus = i; });
    openSheet('busModal');
  });
  document.getElementById('busDone').addEventListener('click', () => {
    condState.bus = pending.bus;
    renderCond();
    closeSheet('busModal');
  });

  // Esc closes any open sheet
  document.addEventListener('keydown', (e) => {
    if (e.key !== 'Escape') return;
    ['speedModal', 'taxiModal', 'busModal'].forEach((id) => {
      const m = document.getElementById(id);
      if (m && m.classList.contains('open')) closeSheet(id);
    });
  });

  renderCond();
})();
</script>
</body>
</html>
