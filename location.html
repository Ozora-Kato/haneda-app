<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=resizes-content" />
<title>HANEDA — 現在地を選択</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Noto+Sans+JP:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
<link rel="stylesheet" href="styles.css" />
<style>
  /* Confine Leaflet's internal z-indices so they don't cover overlays */
  .screen-location .map-canvas { isolation: isolate; z-index: 0; }
  #map { position: absolute; inset: 0; width: 100%; height: 100%; background: #eef2f6; }
  .haneda-pin { background: transparent; border: none; }
  .haneda-pin svg { display: block; filter: drop-shadow(0 3px 6px rgba(0,0,0,0.28)); }
  .leaflet-container { font-family: inherit; }
  .leaflet-control-attribution { font-size: 9px; opacity: 0.75; }

  /* Force overlays above the map */
  .screen-location .status-bar { z-index: 30; }
  .screen-location .loc-search { z-index: 20; }
  .screen-location .zoom-controls { z-index: 20; }
  .screen-location .locate-me { z-index: 20; }
  .screen-location .loc-sheet { z-index: 25; }
  .screen-location .home-ind { z-index: 30; }

  /* Search results dropdown */
  .search-results {
    position: absolute;
    top: 88px;
    left: 16px;
    right: 16px;
    background: #fff;
    border-radius: 14px;
    box-shadow: 0 8px 28px rgba(0, 0, 0, 0.18);
    max-height: 50vh;
    overflow-y: auto;
    z-index: 22;
    display: none;
  }
  .search-results.open { display: block; }
  .search-result-item {
    padding: 12px 16px;
    border-bottom: 1px solid #eef0f4;
    cursor: pointer;
    -webkit-tap-highlight-color: rgba(57, 87, 192, 0.08);
  }
  .search-result-item:last-child { border-bottom: none; }
  .search-result-item:active { background: #f3f5f9; }
  .search-result-name { font-size: 14px; font-weight: 600; color: #1c1f2a; }
  .search-result-addr { font-size: 11px; color: #7a808d; margin-top: 2px; }
  .search-result-empty { padding: 14px 16px; font-size: 12px; color: #9ca0aa; text-align: center; }
</style>
</head>
<body>
<div class="flow-hint">③ 現在地選択画面</div>
<div class="stage">
  <div class="phone">
    <div class="screen screen-location">
      <div class="status-bar">
        <span>9:41</span>
        <div class="status-icons">
          <svg viewBox="0 0 16 11" fill="none"><path d="M1 7c0-.6.4-1 1-1h1c.6 0 1 .4 1 1v3c0 .6-.4 1-1 1H2c-.6 0-1-.4-1-1V7zm5-2c0-.6.4-1 1-1h1c.6 0 1 .4 1 1v5c0 .6-.4 1-1 1H7c-.6 0-1-.4-1-1V5zm5-3c0-.6.4-1 1-1h1c.6 0 1 .4 1 1v8c0 .6-.4 1-1 1h-1c-.6 0-1-.4-1-1V2z" fill="currentColor"/></svg>
          <svg viewBox="0 0 16 11" fill="none"><path d="M8 2c2.2 0 4.2.8 5.8 2.2l-1.4 1.4C11.1 4.5 9.6 4 8 4s-3.1.5-4.4 1.6L2.2 4.2C3.8 2.8 5.8 2 8 2zM8 6c1.1 0 2.1.4 2.9 1l-1.4 1.4C9.1 8.1 8.6 8 8 8c-.6 0-1.1.1-1.5.4L5.1 7c.8-.6 1.8-1 2.9-1zm0 3c.6 0 1 .4 1 1s-.4 1-1 1-1-.4-1-1 .4-1 1-1z" fill="currentColor"/></svg>
          <svg viewBox="0 0 22 11" fill="none"><rect x="1" y="1" width="18" height="9" rx="2" stroke="currentColor" stroke-opacity="0.4"/><rect x="2" y="2" width="16" height="7" rx="1" fill="currentColor"/><rect x="20" y="4" width="1.5" height="3" rx="0.5" fill="currentColor" opacity="0.4"/></svg>
        </div>
      </div>

      <div class="map-canvas">
        <div id="map"></div>
      </div>

      <!-- Search / back overlay -->
      <div class="loc-search">
        <a href="main.html" class="back">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
        </a>
        <input type="text" id="searchInput" placeholder="場所・駅を検索" autocomplete="off" />
        <div class="search-icon">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        </div>
      </div>

      <!-- Search results dropdown -->
      <div class="search-results" id="searchResults"></div>

      <!-- Zoom controls -->
      <div class="zoom-controls">
        <button aria-label="zoom in">+</button>
        <button aria-label="zoom out">−</button>
      </div>

      <!-- Locate-me -->
      <button class="locate-me" aria-label="locate me">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="2" x2="12" y2="4"/><line x1="12" y1="20" x2="12" y2="22"/><line x1="2" y1="12" x2="4" y2="12"/><line x1="20" y1="12" x2="22" y2="12"/><circle cx="12" cy="12" r="3" fill="currentColor"/></svg>
      </button>

      <!-- Bottom sheet -->
      <div class="loc-sheet">
        <div class="lbl">出発地として選択</div>
        <div class="title-row">
          <div class="pin-small">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
          </div>
          <div>
            <div class="title-main" id="selTitle">秋葉原駅</div>
            <div class="title-sub" id="selSub">JR山手線 · 総武線 · つくばエクスプレス</div>
          </div>
        </div>
        <div class="dist">
          <span>現在地からの距離 <span class="v" id="selDist">0 m</span></span>
        </div>

        <div class="loc-suggest">
          <div class="loc-chip">現在地を使用</div>
          <div class="loc-chip active">秋葉原駅</div>
          <div class="loc-chip">末広町駅</div>
          <div class="loc-chip">岩本町駅</div>
          <div class="loc-chip">御徒町駅</div>
        </div>

        <a href="main.html" class="btn-confirm" id="confirmBtn">
          この場所を出発地に設定
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><polyline points="9 18 15 12 9 6"/></svg>
        </a>
      </div>

      <div class="home-ind"></div>
    </div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
<script>
  // Current location: Akihabara (prototype — could be replaced with navigator.geolocation)
  const center = [35.69838, 139.77313];
  let stations = [];
  let selectedId = null;

  const map = L.map('map', { center, zoom: 16, zoomControl: false });

  L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
    attribution: '&copy; OpenStreetMap &copy; CARTO',
    subdomains: 'abcd',
    maxZoom: 19,
  }).addTo(map);

  const pinSVG = (color, size) => `
    <svg width="${size}" height="${size * 36 / 28}" viewBox="0 0 28 36" fill="none">
      <path d="M14 0 C6 0 0 6 0 14 C0 24 14 36 14 36 C14 36 28 24 28 14 C28 6 22 0 14 0 Z" fill="${color}"/>
      <circle cx="14" cy="14" r="6" fill="white"/>
    </svg>`;

  const makeIcon = (active) => {
    const size = active ? 34 : 28;
    const h = size * 36 / 28;
    return L.divIcon({
      className: 'haneda-pin',
      html: pinSVG(active ? '#2844a0' : '#5b8ff0', size),
      iconSize: [size, h],
      iconAnchor: [size / 2, h],
    });
  };

  // Pulsing "current location" marker
  const currentLocIcon = L.divIcon({
    className: 'haneda-pin',
    html: `<div style="width:18px;height:18px;border-radius:50%;background:#3957C0;border:3px solid #fff;box-shadow:0 0 0 6px rgba(57,87,192,0.18);"></div>`,
    iconSize: [18, 18],
    iconAnchor: [9, 9],
  });
  L.marker(center, { icon: currentLocIcon, interactive: false, keyboard: false }).addTo(map);

  // Haversine distance in meters
  function distMeters(a, b) {
    const R = 6371000;
    const toRad = d => d * Math.PI / 180;
    const dLat = toRad(b[0] - a[0]);
    const dLng = toRad(b[1] - a[1]);
    const lat1 = toRad(a[0]), lat2 = toRad(b[0]);
    const x = Math.sin(dLat / 2) ** 2 + Math.cos(lat1) * Math.cos(lat2) * Math.sin(dLng / 2) ** 2;
    return Math.round(2 * R * Math.asin(Math.sqrt(x)));
  }
  const walkMin = m => Math.max(1, Math.round(m / 80));
  const formatDist = m => m === 0 ? '現在地' : `${m}m / 徒歩 約 ${walkMin(m)}分`;

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
  }

  const markers = {};
  let searchPin = null;

  function clearMarkers() {
    Object.values(markers).forEach(m => map.removeLayer(m));
    Object.keys(markers).forEach(k => delete markers[k]);
  }

  function renderStations() {
    clearMarkers();
    stations.forEach(s => {
      const m = L.marker([s.lat, s.lng], { icon: makeIcon(s.id === selectedId), title: s.id }).addTo(map);
      m.on('click', () => selectStation(s.id));
      markers[s.id] = m;
    });
  }

  function renderChips() {
    const container = document.querySelector('.loc-suggest');
    const top = stations.slice(0, 4);
    container.innerHTML =
      '<div class="loc-chip">現在地を使用</div>' +
      top.map(s => `<div class="loc-chip${s.id === selectedId ? ' active' : ''}">${escapeHtml(s.id)}</div>`).join('');
    bindChips();
  }

  function setSheet(title, sub, distText) {
    document.getElementById('selTitle').textContent = title;
    document.getElementById('selSub').textContent = sub;
    document.getElementById('selDist').textContent = distText;
  }

  function selectStation(id) {
    const s = stations.find(x => x.id === id);
    if (!s) return;
    selectedId = id;
    if (searchPin) { map.removeLayer(searchPin); searchPin = null; }
    Object.entries(markers).forEach(([key, mk]) => mk.setIcon(makeIcon(key === id)));
    setSheet(s.id, s.sub, formatDist(s.distM));
    document.querySelectorAll('.loc-chip').forEach(c => {
      c.classList.toggle('active', c.textContent.trim() === s.id);
    });
    map.panTo([s.lat, s.lng]);
  }

  function bindChips() {
    document.querySelectorAll('.loc-chip').forEach(chip => {
      chip.addEventListener('click', () => {
        const label = chip.textContent.trim();
        if (label === '現在地を使用') {
          selectedId = null;
          document.querySelectorAll('.loc-chip').forEach(c => c.classList.remove('active'));
          chip.classList.add('active');
          setSheet('現在地', 'GPSで取得した位置', '0 m');
          if (searchPin) { map.removeLayer(searchPin); searchPin = null; }
          Object.values(markers).forEach(mk => mk.setIcon(makeIcon(false)));
          map.setView(center, 16);
        } else if (stations.find(s => s.id === label)) {
          selectStation(label);
        }
      });
    });
  }

  // Fallback list if Overpass fails
  const FALLBACK_STATIONS = [
    { id: '秋葉原駅', sub: 'JR東日本', lat: 35.69838, lng: 139.77313 },
    { id: '末広町駅', sub: '東京メトロ', lat: 35.70225, lng: 139.77131 },
    { id: '岩本町駅', sub: '都営地下鉄', lat: 35.69428, lng: 139.77789 },
    { id: '御徒町駅', sub: 'JR東日本', lat: 35.70754, lng: 139.77459 },
  ];

  async function loadNearbyStations() {
    const radius = 800;
    const q = `[out:json][timeout:15];(node["railway"="station"](around:${radius},${center[0]},${center[1]});node["public_transport"="station"]["station"!~"."](around:${radius},${center[0]},${center[1]}););out body;`;
    let raw = [];
    try {
      const res = await fetch('https://overpass-api.de/api/interpreter', {
        method: 'POST',
        body: 'data=' + encodeURIComponent(q),
      });
      const data = await res.json();
      raw = data.elements || [];
    } catch (e) {
      console.warn('Overpass failed, using fallback', e);
    }

    const seen = new Set();
    const list = [];
    raw.forEach(e => {
      const t = e.tags || {};
      let name = t['name:ja'] || t.name;
      if (!name || seen.has(name)) return;
      seen.add(name);
      const operator = t.operator || t.network || '';
      const sub = operator || '駅';
      const d = distMeters(center, [e.lat, e.lon]);
      list.push({
        id: name.endsWith('駅') ? name : name + '駅',
        sub,
        lat: e.lat,
        lng: e.lon,
        distM: d,
      });
    });

    if (!list.length) {
      FALLBACK_STATIONS.forEach(s => {
        list.push({ ...s, distM: distMeters(center, [s.lat, s.lng]) });
      });
    }

    list.sort((a, b) => a.distM - b.distM);
    stations = list;
    selectedId = stations[0]?.id || null;
    renderStations();
    renderChips();
    if (selectedId) {
      const s = stations[0];
      setSheet(s.id, s.sub, formatDist(s.distM));
    }
  }

  // ----- Search via Photon (OSM-based, no API key) -----
  const searchInput = document.getElementById('searchInput');
  const searchResults = document.getElementById('searchResults');
  let searchTimer = null;

  searchInput.addEventListener('input', () => {
    const q = searchInput.value.trim();
    clearTimeout(searchTimer);
    if (!q) {
      searchResults.classList.remove('open');
      searchResults.innerHTML = '';
      return;
    }
    searchTimer = setTimeout(() => doSearch(q), 320);
  });

  searchInput.addEventListener('focus', () => {
    if (searchResults.innerHTML) searchResults.classList.add('open');
  });

  document.addEventListener('click', (e) => {
    if (!e.target.closest('.loc-search') && !e.target.closest('.search-results')) {
      searchResults.classList.remove('open');
    }
  });

  async function doSearch(q) {
    const url = `https://photon.komoot.io/api/?q=${encodeURIComponent(q)}&lat=${center[0]}&lon=${center[1]}&limit=8&lang=default`;
    try {
      const res = await fetch(url);
      const data = await res.json();
      const features = (data.features || []).filter(f => f.properties?.name);
      if (!features.length) {
        searchResults.innerHTML = `<div class="search-result-empty">結果が見つかりませんでした</div>`;
        searchResults.classList.add('open');
        return;
      }
      searchResults.innerHTML = features.map((f, i) => {
        const p = f.properties;
        const name = p.name;
        const addrParts = [p.street, p.district, p.city, p.state].filter(Boolean);
        const addr = addrParts.join(' / ') || p.country || '';
        return `<div class="search-result-item" data-idx="${i}">
          <div class="search-result-name">${escapeHtml(name)}</div>
          <div class="search-result-addr">${escapeHtml(addr)}</div>
        </div>`;
      }).join('');
      searchResults.classList.add('open');
      searchResults.querySelectorAll('.search-result-item').forEach((el, i) => {
        el.addEventListener('click', () => pickSearchResult(features[i]));
      });
    } catch (e) {
      console.error('Search failed', e);
      searchResults.innerHTML = `<div class="search-result-empty">検索に失敗しました</div>`;
      searchResults.classList.add('open');
    }
  }

  function pickSearchResult(f) {
    const [lng, lat] = f.geometry.coordinates;
    const name = f.properties.name;
    const p = f.properties;
    const sub = [p.street, p.city].filter(Boolean).join(' / ') || p.osm_value || '検索結果';
    const d = distMeters(center, [lat, lng]);

    if (searchPin) map.removeLayer(searchPin);
    searchPin = L.marker([lat, lng], { icon: makeIcon(true) }).addTo(map);
    map.setView([lat, lng], 16);

    selectedId = null;
    Object.values(markers).forEach(mk => mk.setIcon(makeIcon(false)));
    document.querySelectorAll('.loc-chip').forEach(c => c.classList.remove('active'));

    setSheet(name, sub, formatDist(d));

    searchResults.classList.remove('open');
    searchInput.blur();
  }

  // Custom zoom controls wired to Leaflet
  document.querySelector('.zoom-controls button[aria-label="zoom in"]').addEventListener('click', () => map.zoomIn());
  document.querySelector('.zoom-controls button[aria-label="zoom out"]').addEventListener('click', () => map.zoomOut());

  // Locate-me: pan back to current location
  document.querySelector('.locate-me').addEventListener('click', () => map.setView(center, 16));

  // Confirm: save and return to main
  document.getElementById('confirmBtn').addEventListener('click', (e) => {
    e.preventDefault();
    const title = document.getElementById('selTitle').textContent.trim();
    if (title) localStorage.setItem('haneda:location', title);
    window.location.href = 'main.html';
  });

  // Init
  loadNearbyStations();
</script>
</body>
</html>
