<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=resizes-content" />
<title>HANEDA — 現在地を選択</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Noto+Sans+JP:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
<link rel="stylesheet" href="styles.css" />
<style>
  /* Map container */
  .screen-location .map-canvas { isolation: isolate; z-index: 0; position: absolute; inset: 0; }
  #map { position: absolute; inset: 0; width: 100%; height: 100%; background: #eef2f6; }
  .haneda-pin { background: transparent; border: none; }
  .haneda-pin svg { display: block; filter: drop-shadow(0 3px 6px rgba(0,0,0,0.28)); }
  .leaflet-container { font-family: inherit; }
  .leaflet-control-attribution { font-size: 9px; opacity: 0.75; }

  /* Top nav: 1/3 current location + 2/3 search */
  .loc-topnav {
    position: absolute;
    top: 56px;
    left: 12px;
    right: 12px;
    height: 50px;
    background: #fff;
    border-radius: 14px;
    box-shadow: 0 6px 18px rgba(0, 0, 0, 0.16);
    display: flex;
    align-items: stretch;
    z-index: 20;
    overflow: hidden;
  }
  @media (max-width: 480px) {
    .loc-topnav { top: max(12px, env(safe-area-inset-top)); }
  }
  .loc-current {
    flex: 0 0 33%;
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 0 12px;
    border: none;
    background: none;
    border-right: 1px solid #eef0f4;
    cursor: pointer;
    text-align: left;
    overflow: hidden;
    font-family: inherit;
    -webkit-tap-highlight-color: transparent;
  }
  .loc-current:active { background: #f3f5f9; }
  .loc-current svg { flex: 0 0 16px; color: #3957C0; }
  .loc-current span {
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    font-size: 12px;
    font-weight: 600;
    color: #1c1f2a;
    line-height: 1.2;
  }
  .loc-search-bar {
    flex: 1 1 67%;
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 0 14px;
  }
  .loc-search-bar svg { color: #9ca0aa; flex: 0 0 14px; }
  .loc-search-bar input {
    flex: 1;
    border: none;
    outline: none;
    background: none;
    font-size: 14px;
    font-family: inherit;
    min-width: 0;
    color: #1c1f2a;
  }
  .loc-search-bar input::placeholder { color: #9ca0aa; }

  /* Search results dropdown */
  .search-results {
    position: absolute;
    top: 116px;
    left: 12px;
    right: 12px;
    background: #fff;
    border-radius: 14px;
    box-shadow: 0 8px 28px rgba(0, 0, 0, 0.18);
    max-height: 50vh;
    overflow-y: auto;
    z-index: 22;
    display: none;
  }
  @media (max-width: 480px) {
    .search-results { top: calc(max(12px, env(safe-area-inset-top)) + 60px); }
  }
  .search-results.open { display: block; }
  .search-result-item {
    padding: 12px 16px;
    border-bottom: 1px solid #eef0f4;
    cursor: pointer;
    -webkit-tap-highlight-color: rgba(57, 87, 192, 0.08);
  }
  .search-result-item:last-child { border-bottom: none; }
  .search-result-item:active { background: #f3f5f9; }
  .search-result-name { font-size: 14px; font-weight: 600; color: #1c1f2a; }
  .search-result-addr { font-size: 11px; color: #7a808d; margin-top: 2px; }
  .search-result-empty { padding: 14px 16px; font-size: 12px; color: #9ca0aa; text-align: center; }

  /* Station popup (below pin) */
  .station-popup {
    position: absolute;
    z-index: 1000;
    background: #fff;
    border-radius: 14px;
    box-shadow: 0 10px 28px rgba(0, 0, 0, 0.22);
    padding: 14px 16px 12px;
    width: 240px;
    transform: translateX(-50%);
    pointer-events: auto;
    display: none;
  }
  .station-popup.open { display: block; }
  .station-popup::before {
    content: '';
    position: absolute;
    top: -8px;
    left: 50%;
    transform: translateX(-50%);
    width: 0;
    height: 0;
    border-left: 9px solid transparent;
    border-right: 9px solid transparent;
    border-bottom: 9px solid #fff;
  }
  .popup-name { font-size: 15px; font-weight: 700; color: #1c1f2a; line-height: 1.3; }
  .popup-sub { font-size: 11px; color: #7a808d; margin-top: 2px; line-height: 1.3; }
  .popup-dist { font-size: 12px; color: #3957C0; font-weight: 600; margin-top: 8px; }
  .popup-cta {
    margin-top: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    width: 100%;
    background: #3957C0;
    color: #fff;
    border: none;
    border-radius: 999px;
    padding: 10px 14px;
    font-size: 13px;
    font-weight: 700;
    font-family: inherit;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .popup-cta:active { background: #2c45a0; }

  /* Other overlays */
  .screen-location .status-bar { z-index: 30; }
  .screen-location .zoom-controls { z-index: 19; }
  .screen-location .locate-me { z-index: 19; }
  .screen-location .home-ind { z-index: 30; }
</style>
</head>
<body>
<div class="flow-hint">③ 現在地選択画面</div>
<div class="stage">
  <div class="phone">
    <div class="screen screen-location">
      <div class="status-bar">
        <span>9:41</span>
        <div class="status-icons">
          <svg viewBox="0 0 16 11" fill="none"><path d="M1 7c0-.6.4-1 1-1h1c.6 0 1 .4 1 1v3c0 .6-.4 1-1 1H2c-.6 0-1-.4-1-1V7zm5-2c0-.6.4-1 1-1h1c.6 0 1 .4 1 1v5c0 .6-.4 1-1 1H7c-.6 0-1-.4-1-1V5zm5-3c0-.6.4-1 1-1h1c.6 0 1 .4 1 1v8c0 .6-.4 1-1 1h-1c-.6 0-1-.4-1-1V2z" fill="currentColor"/></svg>
          <svg viewBox="0 0 16 11" fill="none"><path d="M8 2c2.2 0 4.2.8 5.8 2.2l-1.4 1.4C11.1 4.5 9.6 4 8 4s-3.1.5-4.4 1.6L2.2 4.2C3.8 2.8 5.8 2 8 2zM8 6c1.1 0 2.1.4 2.9 1l-1.4 1.4C9.1 8.1 8.6 8 8 8c-.6 0-1.1.1-1.5.4L5.1 7c.8-.6 1.8-1 2.9-1zm0 3c.6 0 1 .4 1 1s-.4 1-1 1-1-.4-1-1 .4-1 1-1z" fill="currentColor"/></svg>
          <svg viewBox="0 0 22 11" fill="none"><rect x="1" y="1" width="18" height="9" rx="2" stroke="currentColor" stroke-opacity="0.4"/><rect x="2" y="2" width="16" height="7" rx="1" fill="currentColor"/><rect x="20" y="4" width="1.5" height="3" rx="0.5" fill="currentColor" opacity="0.4"/></svg>
        </div>
      </div>

      <div class="map-canvas">
        <div id="map"></div>
        <div class="station-popup" id="stationPopup"></div>
      </div>

      <!-- Top nav: current location + search -->
      <div class="loc-topnav">
        <button class="loc-current" id="locCurrent" aria-label="現在地に戻る">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/>
            <line x1="12" y1="2" x2="12" y2="4"/>
            <line x1="12" y1="20" x2="12" y2="22"/>
            <line x1="2" y1="12" x2="4" y2="12"/>
            <line x1="20" y1="12" x2="22" y2="12"/>
            <circle cx="12" cy="12" r="3" fill="currentColor"/>
          </svg>
          <span>現在地</span>
        </button>
        <div class="loc-search-bar">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input type="text" id="searchInput" placeholder="場所・駅を検索" autocomplete="off" />
        </div>
      </div>

      <!-- Search results dropdown -->
      <div class="search-results" id="searchResults"></div>

      <!-- Zoom controls -->
      <div class="zoom-controls">
        <button aria-label="zoom in">+</button>
        <button aria-label="zoom out">−</button>
      </div>

      <!-- Locate-me -->
      <button class="locate-me" aria-label="locate me">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="2" x2="12" y2="4"/><line x1="12" y1="20" x2="12" y2="22"/><line x1="2" y1="12" x2="4" y2="12"/><line x1="20" y1="12" x2="22" y2="12"/><circle cx="12" cy="12" r="3" fill="currentColor"/></svg>
      </button>

      <div class="home-ind"></div>
    </div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
<script>
  // Current location: Akihabara prototype center
  const center = [35.69838, 139.77313];
  let stations = [];

  const map = L.map('map', { center, zoom: 16, zoomControl: false });

  L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
    attribution: '&copy; OpenStreetMap &copy; CARTO',
    subdomains: 'abcd',
    maxZoom: 19,
  }).addTo(map);

  // Pin SVG and icon factory
  const pinSVG = (color, size) => `
    <svg width="${size}" height="${size * 36 / 28}" viewBox="0 0 28 36" fill="none">
      <path d="M14 0 C6 0 0 6 0 14 C0 24 14 36 14 36 C14 36 28 24 28 14 C28 6 22 0 14 0 Z" fill="${color}"/>
      <circle cx="14" cy="14" r="6" fill="white"/>
    </svg>`;

  const makeIcon = (active) => {
    const size = active ? 34 : 28;
    const h = size * 36 / 28;
    return L.divIcon({
      className: 'haneda-pin',
      html: pinSVG(active ? '#2844a0' : '#5b8ff0', size),
      iconSize: [size, h],
      iconAnchor: [size / 2, h],
    });
  };

  // Pulsing current-location marker (interactive — tap opens popup)
  const currentLocIcon = L.divIcon({
    className: 'haneda-pin',
    html: `<div style="width:18px;height:18px;border-radius:50%;background:#3957C0;border:3px solid #fff;box-shadow:0 0 0 6px rgba(57,87,192,0.18);"></div>`,
    iconSize: [18, 18],
    iconAnchor: [9, 9],
  });
  const currentLocMarker = L.marker(center, { icon: currentLocIcon, keyboard: false }).addTo(map);
  currentLocMarker.on('click', () => {
    openPopup({ lat: center[0], lng: center[1], name: '現在地', sub: 'GPSで取得した位置', distM: 0 });
  });

  // Helpers
  function distMeters(a, b) {
    const R = 6371000;
    const toRad = d => d * Math.PI / 180;
    const dLat = toRad(b[0] - a[0]);
    const dLng = toRad(b[1] - a[1]);
    const lat1 = toRad(a[0]), lat2 = toRad(b[0]);
    const x = Math.sin(dLat / 2) ** 2 + Math.cos(lat1) * Math.cos(lat2) * Math.sin(dLng / 2) ** 2;
    return Math.round(2 * R * Math.asin(Math.sqrt(x)));
  }
  const walkMin = m => Math.max(1, Math.round(m / 80));
  const formatDist = m => m === 0 ? '現在地' : `現在地から ${m}m / 徒歩 約 ${walkMin(m)}分`;
  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
  }

  // ----- Popup overlay (below pin) -----
  const popupEl = document.getElementById('stationPopup');
  L.DomEvent.disableClickPropagation(popupEl); // don't bubble clicks to map
  let activePoint = null; // { lat, lng, name, sub, distM }

  function openPopup(point) {
    activePoint = point;
    popupEl.innerHTML = `
      <div class="popup-name">${escapeHtml(point.name)}</div>
      <div class="popup-sub">${escapeHtml(point.sub || '')}</div>
      <div class="popup-dist">${escapeHtml(formatDist(point.distM))}</div>
      <button class="popup-cta" id="popupCta">
        この場所を出発地点に設定
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><polyline points="9 18 15 12 9 6"/></svg>
      </button>
    `;
    popupEl.classList.add('open');
    document.getElementById('popupCta').addEventListener('click', () => {
      localStorage.setItem('haneda:location', point.name);
      window.location.href = 'main.html';
    });
    repositionPopup();
  }

  function closePopup() {
    popupEl.classList.remove('open');
    activePoint = null;
    if (searchPin) { map.removeLayer(searchPin); searchPin = null; }
    Object.values(markers).forEach(m => m.setIcon(makeIcon(false)));
  }

  function repositionPopup() {
    if (!activePoint) return;
    const p = map.latLngToContainerPoint([activePoint.lat, activePoint.lng]);
    popupEl.style.left = p.x + 'px';
    popupEl.style.top = (p.y + 12) + 'px';
  }

  map.on('move zoom', repositionPopup);
  map.on('click', closePopup);

  // ----- Station markers -----
  const markers = {};
  let searchPin = null;

  function highlightStation(id) {
    Object.entries(markers).forEach(([key, mk]) => mk.setIcon(makeIcon(key === id)));
    if (searchPin) { map.removeLayer(searchPin); searchPin = null; }
  }

  function renderStations() {
    Object.values(markers).forEach(m => map.removeLayer(m));
    Object.keys(markers).forEach(k => delete markers[k]);
    stations.forEach(s => {
      const m = L.marker([s.lat, s.lng], { icon: makeIcon(false), title: s.id }).addTo(map);
      m.on('click', () => {
        highlightStation(s.id);
        map.panTo([s.lat, s.lng]);
        openPopup({ lat: s.lat, lng: s.lng, name: s.id, sub: s.sub, distM: s.distM });
      });
      markers[s.id] = m;
    });
  }

  // ----- Current location button -----
  document.getElementById('locCurrent').addEventListener('click', () => {
    map.setView(center, 16);
    highlightStation(null);
    openPopup({ lat: center[0], lng: center[1], name: '現在地', sub: 'GPSで取得した位置', distM: 0 });
  });

  // ----- Nearby station load (Overpass) -----
  const FALLBACK_STATIONS = [
    { id: '秋葉原駅', sub: 'JR東日本', lat: 35.69838, lng: 139.77313 },
    { id: '末広町駅', sub: '東京メトロ', lat: 35.70225, lng: 139.77131 },
    { id: '岩本町駅', sub: '都営地下鉄', lat: 35.69428, lng: 139.77789 },
    { id: '御徒町駅', sub: 'JR東日本', lat: 35.70754, lng: 139.77459 },
  ];

  async function loadNearbyStations() {
    const radius = 800;
    const q = `[out:json][timeout:15];(node["railway"="station"](around:${radius},${center[0]},${center[1]});node["public_transport"="station"](around:${radius},${center[0]},${center[1]}););out body;`;
    let raw = [];
    try {
      const res = await fetch('https://overpass-api.de/api/interpreter', {
        method: 'POST',
        body: 'data=' + encodeURIComponent(q),
      });
      const data = await res.json();
      raw = data.elements || [];
    } catch (e) {
      console.warn('Overpass failed, using fallback', e);
    }

    const seen = new Set();
    const list = [];
    raw.forEach(e => {
      const t = e.tags || {};
      const name = t['name:ja'] || t.name;
      if (!name || seen.has(name)) return;
      seen.add(name);
      const operator = t.operator || t.network || '';
      list.push({
        id: name.endsWith('駅') ? name : name + '駅',
        sub: operator || '駅',
        lat: e.lat,
        lng: e.lon,
        distM: distMeters(center, [e.lat, e.lon]),
      });
    });

    if (!list.length) {
      FALLBACK_STATIONS.forEach(s => {
        list.push({ ...s, distM: distMeters(center, [s.lat, s.lng]) });
      });
    }

    list.sort((a, b) => a.distM - b.distM);
    stations = list;
    renderStations();
  }

  // ----- Search via Photon -----
  const searchInput = document.getElementById('searchInput');
  const searchResults = document.getElementById('searchResults');
  let searchTimer = null;

  searchInput.addEventListener('input', () => {
    const q = searchInput.value.trim();
    clearTimeout(searchTimer);
    if (!q) {
      searchResults.classList.remove('open');
      searchResults.innerHTML = '';
      return;
    }
    searchTimer = setTimeout(() => doSearch(q), 320);
  });

  searchInput.addEventListener('focus', () => {
    if (searchResults.innerHTML) searchResults.classList.add('open');
  });

  document.addEventListener('click', (e) => {
    if (!e.target.closest('.loc-topnav') && !e.target.closest('.search-results')) {
      searchResults.classList.remove('open');
    }
  });

  async function doSearch(q) {
    const url = `https://photon.komoot.io/api/?q=${encodeURIComponent(q)}&lat=${center[0]}&lon=${center[1]}&limit=8&lang=default`;
    try {
      const res = await fetch(url);
      const data = await res.json();
      const features = (data.features || []).filter(f => f.properties?.name);
      if (!features.length) {
        searchResults.innerHTML = `<div class="search-result-empty">結果が見つかりませんでした</div>`;
        searchResults.classList.add('open');
        return;
      }
      searchResults.innerHTML = features.map((f, i) => {
        const p = f.properties;
        const addr = [p.street, p.district, p.city, p.state].filter(Boolean).join(' / ') || p.country || '';
        return `<div class="search-result-item" data-idx="${i}">
          <div class="search-result-name">${escapeHtml(p.name)}</div>
          <div class="search-result-addr">${escapeHtml(addr)}</div>
        </div>`;
      }).join('');
      searchResults.classList.add('open');
      searchResults.querySelectorAll('.search-result-item').forEach((el, i) => {
        el.addEventListener('click', () => pickSearchResult(features[i]));
      });
    } catch (e) {
      console.error('Search failed', e);
      searchResults.innerHTML = `<div class="search-result-empty">検索に失敗しました</div>`;
      searchResults.classList.add('open');
    }
  }

  function pickSearchResult(f) {
    const [lng, lat] = f.geometry.coordinates;
    const name = f.properties.name;
    const p = f.properties;
    const sub = [p.street, p.city].filter(Boolean).join(' / ') || p.osm_value || '検索結果';
    const d = distMeters(center, [lat, lng]);

    Object.values(markers).forEach(m => m.setIcon(makeIcon(false)));
    if (searchPin) map.removeLayer(searchPin);
    searchPin = L.marker([lat, lng], { icon: makeIcon(true) }).addTo(map);
    searchPin.on('click', () => openPopup({ lat, lng, name, sub, distM: d }));

    map.setView([lat, lng], 16);
    openPopup({ lat, lng, name, sub, distM: d });

    searchResults.classList.remove('open');
    searchInput.blur();
  }

  // ----- Map controls -----
  document.querySelector('.zoom-controls button[aria-label="zoom in"]').addEventListener('click', (e) => {
    e.stopPropagation();
    map.zoomIn();
  });
  document.querySelector('.zoom-controls button[aria-label="zoom out"]').addEventListener('click', (e) => {
    e.stopPropagation();
    map.zoomOut();
  });
  document.querySelector('.locate-me').addEventListener('click', (e) => {
    e.stopPropagation();
    map.setView(center, 16);
  });

  // Init
  loadNearbyStations();
</script>
</body>
</html>
