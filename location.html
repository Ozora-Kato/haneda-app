<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=resizes-content" />
<title>HANEDA — 現在地を選択</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Noto+Sans+JP:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
<link rel="stylesheet" href="styles.css" />
<style>
  #map { position: absolute; inset: 0; width: 100%; height: 100%; background: #eef2f6; }
  .haneda-pin { background: transparent; border: none; }
  .haneda-pin svg { display: block; filter: drop-shadow(0 3px 6px rgba(0,0,0,0.28)); }
  .leaflet-container { font-family: inherit; }
  .leaflet-control-attribution { font-size: 9px; opacity: 0.75; }
</style>
</head>
<body>
<div class="flow-hint">③ 現在地選択画面</div>
<div class="stage">
  <div class="phone">
    <div class="screen screen-location">
      <div class="status-bar">
        <span>9:41</span>
        <div class="status-icons">
          <svg viewBox="0 0 16 11" fill="none"><path d="M1 7c0-.6.4-1 1-1h1c.6 0 1 .4 1 1v3c0 .6-.4 1-1 1H2c-.6 0-1-.4-1-1V7zm5-2c0-.6.4-1 1-1h1c.6 0 1 .4 1 1v5c0 .6-.4 1-1 1H7c-.6 0-1-.4-1-1V5zm5-3c0-.6.4-1 1-1h1c.6 0 1 .4 1 1v8c0 .6-.4 1-1 1h-1c-.6 0-1-.4-1-1V2z" fill="currentColor"/></svg>
          <svg viewBox="0 0 16 11" fill="none"><path d="M8 2c2.2 0 4.2.8 5.8 2.2l-1.4 1.4C11.1 4.5 9.6 4 8 4s-3.1.5-4.4 1.6L2.2 4.2C3.8 2.8 5.8 2 8 2zM8 6c1.1 0 2.1.4 2.9 1l-1.4 1.4C9.1 8.1 8.6 8 8 8c-.6 0-1.1.1-1.5.4L5.1 7c.8-.6 1.8-1 2.9-1zm0 3c.6 0 1 .4 1 1s-.4 1-1 1-1-.4-1-1 .4-1 1-1z" fill="currentColor"/></svg>
          <svg viewBox="0 0 22 11" fill="none"><rect x="1" y="1" width="18" height="9" rx="2" stroke="currentColor" stroke-opacity="0.4"/><rect x="2" y="2" width="16" height="7" rx="1" fill="currentColor"/><rect x="20" y="4" width="1.5" height="3" rx="0.5" fill="currentColor" opacity="0.4"/></svg>
        </div>
      </div>

      <div class="map-canvas">
        <div id="map"></div>
      </div>

      <!-- Search / back overlay -->
      <div class="loc-search">
        <a href="main.html" class="back">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
        </a>
        <input type="text" placeholder="場所を検索" />
        <div class="search-icon">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        </div>
      </div>

      <!-- Zoom controls -->
      <div class="zoom-controls">
        <button aria-label="zoom in">+</button>
        <button aria-label="zoom out">−</button>
      </div>

      <!-- Locate-me -->
      <button class="locate-me" aria-label="locate me">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="2" x2="12" y2="4"/><line x1="12" y1="20" x2="12" y2="22"/><line x1="2" y1="12" x2="4" y2="12"/><line x1="20" y1="12" x2="22" y2="12"/><circle cx="12" cy="12" r="3" fill="currentColor"/></svg>
      </button>

      <!-- Bottom sheet -->
      <div class="loc-sheet">
        <div class="lbl">出発地として選択</div>
        <div class="title-row">
          <div class="pin-small">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
          </div>
          <div>
            <div class="title-main" id="selTitle">秋葉原駅</div>
            <div class="title-sub" id="selSub">JR山手線 · 総武線 · つくばエクスプレス</div>
          </div>
        </div>
        <div class="dist">
          <span>現在地からの距離 <span class="v" id="selDist">0 m</span></span>
        </div>

        <div class="loc-suggest">
          <div class="loc-chip">現在地を使用</div>
          <div class="loc-chip active">秋葉原駅</div>
          <div class="loc-chip">末広町駅</div>
          <div class="loc-chip">岩本町駅</div>
          <div class="loc-chip">御徒町駅</div>
        </div>

        <a href="main.html" class="btn-confirm" id="confirmBtn">
          この場所を出発地に設定
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><polyline points="9 18 15 12 9 6"/></svg>
        </a>
      </div>

      <div class="home-ind"></div>
    </div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
<script>
  const stations = [
    { id: '秋葉原駅', sub: 'JR山手線 · 総武線 · つくばエクスプレス', dist: '現在地 / 徒歩 約 1分', lat: 35.69838, lng: 139.77313, primary: true },
    { id: '末広町駅', sub: '東京メトロ銀座線', dist: '450m / 徒歩 約 6分', lat: 35.70225, lng: 139.77131 },
    { id: '岩本町駅', sub: '都営新宿線', dist: '380m / 徒歩 約 5分', lat: 35.69428, lng: 139.77789 },
    { id: '御徒町駅', sub: 'JR山手線 · 京浜東北線', dist: '620m / 徒歩 約 8分', lat: 35.70754, lng: 139.77459 },
  ];
  const center = [stations[0].lat, stations[0].lng];

  const map = L.map('map', {
    center,
    zoom: 16,
    zoomControl: false,
  });

  L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
    attribution: '&copy; OpenStreetMap &copy; CARTO',
    subdomains: 'abcd',
    maxZoom: 19,
  }).addTo(map);

  const pinSVG = (color, size) => `
    <svg width="${size}" height="${size * 36 / 28}" viewBox="0 0 28 36" fill="none">
      <path d="M14 0 C6 0 0 6 0 14 C0 24 14 36 14 36 C14 36 28 24 28 14 C28 6 22 0 14 0 Z" fill="${color}"/>
      <circle cx="14" cy="14" r="6" fill="white"/>
    </svg>`;

  const makeIcon = (active) => {
    const size = active ? 34 : 28;
    const h = size * 36 / 28;
    return L.divIcon({
      className: 'haneda-pin',
      html: pinSVG(active ? '#2844a0' : '#5b8ff0', size),
      iconSize: [size, h],
      iconAnchor: [size / 2, h],
    });
  };

  // Pulsing "current location" marker (Akihabara)
  const currentLocIcon = L.divIcon({
    className: 'haneda-pin',
    html: `<div style="width:18px;height:18px;border-radius:50%;background:#3957C0;border:3px solid #fff;box-shadow:0 0 0 6px rgba(57,87,192,0.18);"></div>`,
    iconSize: [18, 18],
    iconAnchor: [9, 9],
  });
  L.marker(center, { icon: currentLocIcon, interactive: false, keyboard: false }).addTo(map);

  const markers = {};
  stations.forEach(s => {
    const m = L.marker([s.lat, s.lng], { icon: makeIcon(!!s.primary), title: s.id }).addTo(map);
    m.on('click', () => selectStation(s.id));
    markers[s.id] = m;
  });

  function selectStation(id) {
    const s = stations.find(x => x.id === id);
    if (!s) return;
    Object.entries(markers).forEach(([key, mk]) => mk.setIcon(makeIcon(key === id)));
    document.getElementById('selTitle').textContent = s.id;
    document.getElementById('selSub').textContent = s.sub;
    document.getElementById('selDist').textContent = s.dist;
    document.querySelectorAll('.loc-chip').forEach(c => {
      c.classList.toggle('active', c.textContent.trim() === s.id);
    });
    map.panTo([s.lat, s.lng]);
  }

  document.querySelectorAll('.loc-chip').forEach(chip => {
    chip.addEventListener('click', () => {
      const label = chip.textContent.trim();
      if (label === '現在地を使用') {
        document.querySelectorAll('.loc-chip').forEach(c => c.classList.remove('active'));
        chip.classList.add('active');
        document.getElementById('selTitle').textContent = '現在地';
        document.getElementById('selSub').textContent = 'GPSで取得した位置';
        document.getElementById('selDist').textContent = '0 m';
        Object.values(markers).forEach(mk => mk.setIcon(makeIcon(false)));
        map.setView(center, 16);
      } else if (stations.find(s => s.id === label)) {
        selectStation(label);
      }
    });
  });

  // Custom zoom controls wired to Leaflet
  document.querySelector('.zoom-controls button[aria-label="zoom in"]').addEventListener('click', () => map.zoomIn());
  document.querySelector('.zoom-controls button[aria-label="zoom out"]').addEventListener('click', () => map.zoomOut());

  // Locate-me: pan back to current location
  document.querySelector('.locate-me').addEventListener('click', () => map.setView(center, 16));

  // Confirm: save and return to main
  document.getElementById('confirmBtn').addEventListener('click', (e) => {
    e.preventDefault();
    const title = document.getElementById('selTitle').textContent.trim();
    if (title) localStorage.setItem('haneda:location', title);
    window.location.href = 'main.html';
  });
</script>
</body>
</html>
